<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Match Management</title>
    <link rel="stylesheet" href="../../shared-admin.css?v=10" />
    <style>
        .score-input {
            width: 50px;
            height: 32px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s;
        }

        .score-input:focus {
            border-color: #ff8c00;
        }

        .save-match-btn {
            background: #ff8c00;
            color: white;
            border: none;
            border-radius: 48px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-left: 12px;
        }

        .save-match-btn:hover {
            background: #e67e00;
            transform: scale(1.05);
        }

        .save-match-btn:active {
            transform: scale(0.95);
        }

        .status-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 999px;
            text-transform: uppercase;
        }

        .status-finished {
            background: #dcfce7;
            color: #15803d;
        }

        .status-pending {
            background: #f1f5f9;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="admin-match-management">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link">Home</a>
                    <a href="#" class="ns-nav-link" onclick="openModal('explore-modal');return false;">Explore</a>
                    <a href="#" class="ns-nav-link" onclick="openModal('news-modal');return false;">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="Logout">
                    <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                    <img class="ns-user-avatar" src="../../icons/user.svg" alt="User profile" />
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html">
                    <img src="../../icons/stats.svg" alt="stats" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link" href="../TournamentList Page 9/TournamentList_9.html">
                    <img src="../../icons/trophy-star.svg" alt="trophy" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html">
                    <img src="../../icons/users.svg" alt="teams" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" onclick="openModal('about-modal');return false;">
                    <img src="../../icons/info.svg" alt="info" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" onclick="openModal('settings-modal');return false;">
                    <img src="../../icons/settings.svg" alt="settings" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="frame">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
                <div>
                    <h1 id="tournament-title" style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0 0 8px;">Match Management</h1>
                    <p id="tournament-subtitle" style="font-size: 14px; color: #64748b; margin: 0;">Update match scores and manage tournament progression.</p>
                </div>
                <button onclick="goToBracket()" class="save-match-btn" style="height: 44px; padding: 0 24px; font-size: 14px; border-radius: 12px;">
                    View Bracket View
                </button>
            </div>

            <div id="match-list-container" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
                <p style="padding: 40px; text-align: center; color: #94a3b8;">Loading matches...</p>
            </div>
        </main>
    </div>

    <!-- Modals (Reused from Dashboard) -->
    <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;align-items:center;justify-content:center;" onclick="if(event.target===this)closeModal()">
        <div id="about-modal" class="modal-box" style="display:none; background:white; padding:24px; border-radius:20px; width:400px;">
            <h2>About</h2>
            <button onclick="closeModal()">Close</button>
        </div>
        <div id="settings-modal" class="modal-box" style="display:none; background:white; padding:24px; border-radius:20px; width:400px;">
            <h2>Settings</h2>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    
    <script src="./match_management_23.js"></script>
</body>

</html>
