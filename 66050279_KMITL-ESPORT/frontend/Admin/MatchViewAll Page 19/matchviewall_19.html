<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Match View</title>
    <link rel="stylesheet" href="globals19.css" />
    <link rel="stylesheet" href="styleguide19.css" />
    <link rel="stylesheet" href="style19.css" />
</head>

<body>
    <div class="admin-match-view-all">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="img/chatgpt-image-4-2569-15-54-45-removebg-preview-1.png"
                    alt="KMITL ESPORT Logo" />
                <div class="div">
                    <div class="div-2">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Primary navigation">
                    <div class="div-2"><a class="text" href="../Dashboard Page 8/Dashboard_8.html" style="text-decoration: none; color: inherit;">Home</a></div>
                    <div class="div-2"><a class="text-2" href="#">Explore</a></div>
                    <div class="div-2"><a class="text-3" href="#">News</a></div>
                </nav>
            </div>
            <div class="container-3">
                <div class="label" role="search">
                    <div class="container-4">
                        <div class="background">
                            <div class="div-2">
                                <img class="icon" src="img/icon-4.svg" alt="Search icon" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="button-wrapper">
                    <button class="button" type="button" aria-label="Add new item">
                        <span class="iconstack-io-plus" aria-hidden="true">
                            <img class="vector" src="img/vector-2.svg" alt="" />
                            <img class="img" src="img/vector.svg" alt="" />
                        </span>
                    </button>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User profile" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">
                <a class="link" href="#" aria-current="page">
                    <div class="div-2">
                        <img class="icon-2" src="img/icon-3.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div-2">
                        <span class="text-5">Tournaments</span>
                    </div>
                </a>
                <a class="link-2" href="#">
                    <div class="div-2">
                        <img class="icon-3" src="img/icon.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div-2">
                        <span class="text-6">About</span>
                    </div>
                </a>
                <a class="link-2" href="#">
                    <div class="div-2">
                        <img class="icon-4" src="img/icon-2.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div-2">
                        <span class="text-7">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="section" aria-label="Upcoming Matches">
            <div class="heading">
                <div class="icon-wrapper">
                    <img class="icon-5" src="img/image.svg" alt="" aria-hidden="true" />
                </div>
                <h1 class="text-wrapper-2">Upcoming Matches</h1>
            </div>
            <div class="container-6">
                <!-- Match 1 -->
                <article class="background-border" aria-label="Match: Team Omega vs KMITL Knights">
                    <div class="container-7">
                        <div class="container-8">
                            <div class="div-2"><span class="text-8">START IN</span></div>
                            <div class="div-2"><time class="text-9">15:30</time></div>
                        </div>
                        <div class="container-9">
                            <div class="div">
                                <div class="div-2"><span class="text-10">Team Omega</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-3">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-wrapper-4">KMITL Knights</span></div>
                            </div>
                        </div>
                    </div>
                </article>
                <!-- Match 2 -->
                <article class="container-wrapper" aria-label="Match: Steel Rebels vs Shadow Step">
                    <div class="container-10">
                        <div class="container-11">
                            <div class="div-2"><span class="text-11">DEC 12</span></div>
                            <div class="div-2"><time class="text-12">20:00</time></div>
                        </div>
                        <div class="container-12">
                            <div class="div">
                                <div class="div-2"><span class="text-13">Steel Rebels</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-3">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-14">Shadow Step</span></div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-13">
                <span class="text-wrapper-5">© 2026 KMITL ESPORT</span>
            </div>
            <a class="text-wrapper-6" href="#">Documentation</a>
            <a class="text-wrapper-7" href="#">API Reference</a>
            <a class="text-wrapper-8" href="#">Support</a>
        </footer>
    </div>
</body>

</html>
