<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Edit Team - KMITL ESPORT</title>
    <link rel="stylesheet" href="globals14.css" />
    <link rel="stylesheet" href="styleguide14.css" />
    <link rel="stylesheet" href="style14.css?v=3" />
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>
<body>
    <!-- Standardized Universal Header -->
    <header class="header-top namespaced-header" role="banner">
        <div class="ns-header-left">
            <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
            <div class="ns-title-wrap">
                <span class="ns-title-text">KMITL ESPORT</span>
            </div>
            <nav class="ns-main-nav" aria-label="Main navigation">
                <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link">Home</a>
                <a href="#" class="ns-nav-link">Explore</a>
                <a href="#" class="ns-nav-link">News</a>
            </nav>
        </div>
        <div class="ns-header-right">
            <label class="ns-search-box" aria-label="Search tournaments">
                <div class="ns-search-bg">
                    <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                </div>
                <input class="ns-search-input" placeholder="Search tournaments..." type="search" />
            </label>
            <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Login Page/login.html";}}
            </script>
        </div>
    </header>

    <div class="layout-wrapper">
        <!-- Standardized Universal Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <img src="../../../icons/stats.svg" alt="Dashboard icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Column -->
        <div class="main-column">
            <main class="content-body">
                <div class="summary-card">
                    <!-- Tournament Context (Read Only) -->
                    <header class="card-header">
                        <div class="banner-box">
                            <img id="tournament-banner" class="tournament-banner" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200" alt="" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200';" />
                        </div>
                        <div class="header-info">
                            <span class="ov-label">RESGISTRATION EDIT</span>
                            <h1 class="tournament-title" id="tournament-name">Loading...</h1>
                            <div class="meta-row">
                                <img class="meta-icon" src="../../../icons/calendar-day.svg" alt="" />
                                <span id="tournament-date">...</span>
                            </div>
                        </div>
                    </header>

                    <!-- Edit Form -->
                    <div class="details-grid">
                        <!-- Left: Identity -->
                        <div class="column">
                            <div class="section-label">
                                <img src="../../../icons/users.svg" class="label-icon" alt="" />
                                <span>TEAM IDENTITY</span>
                            </div>
                            
                            <div class="identity-row">
                                <div class="logo-box" id="logo-trigger" title="Click to change logo URL">
                                    <img id="team-logo-preview" src="" alt="Logo" onerror="this.style.display='none';" />
                                    <div class="logo-overlay">EDIT</div>
                                </div>
                                <div class="edit-box" style="flex:1;">
                                    <span class="input-label">Team Name</span>
                                    <input type="text" id="input-team-name" class="edit-input" placeholder="Team Name" />
                                </div>
                            </div>

                            <div class="edit-box">
                                <span class="input-label">Team Leader</span>
                                <input type="text" id="input-leader-name" class="edit-input" placeholder="Leader Name" />
                            </div>
                        </div>

                        <!-- Right: Members -->
                        <div class="column">
                            <div class="section-label">
                                <img src="../../../icons/users.svg" class="label-icon" alt="" />
                                <span>TEAM MEMBERS</span>
                            </div>
                            <ul class="member-list">
                                <li class="member-input-item">
                                    <span class="member-rank">1</span>
                                    <input type="text" id="member-1" class="edit-input" placeholder="Member 1" />
                                </li>
                                <li class="member-input-item">
                                    <span class="member-rank">2</span>
                                    <input type="text" id="member-2" class="edit-input" placeholder="Member 2" />
                                </li>
                                <li class="member-input-item">
                                    <span class="member-rank">3</span>
                                    <input type="text" id="member-3" class="edit-input" placeholder="Member 3" />
                                </li>
                                <li class="member-input-item">
                                    <span class="member-rank">4</span>
                                    <input type="text" id="member-4" class="edit-input" placeholder="Member 4" />
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <footer class="card-footer">
                        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
                        <button class="btn btn-confirm" id="btn-confirm">Confirm Changes</button>
                    </footer>
                </div>
            </main>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');
            const apiBase = API_BASE_URL;

            if (!teamId) {
                alert('No Team ID found');
                window.location.href = '../TeamList Page 12/TeamList_12.html';
                return;
            }

            let currentLogoUrl = "";

            // --- 1. Load Data ---
            async function loadData() {
                try {
                    const res = await fetch(`${API_BASE_URL}/teams/${teamId}`);
                    const data = await res.json();
                    
                    if (res.ok && data.team) {
                        const team = data.team;
                        
                        // Populate Inputs
                        document.getElementById('input-team-name').value = team.team_name || '';
                        document.getElementById('input-leader-name').value = team.leader_name || '';
                        document.getElementById('member-1').value = team.member_1 || '';
                        document.getElementById('member-2').value = team.member_2 || '';
                        document.getElementById('member-3').value = team.member_3 || '';
                        document.getElementById('member-4').value = team.member_4 || '';
                        
                        // Logo Preview
                        currentLogoUrl = team.team_banner_url || '';
                        updateLogoPreview();

                        // Tournament Context
                        if (data.applications && data.applications.length > 0) {
                            const tournament = data.applications[0].tournament;
                            document.getElementById('tournament-name').textContent = tournament.tournament_name;
                            document.getElementById('tournament-date').textContent = new Date(tournament.start_date).toLocaleDateString();
                            const fallbackT = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200';
                            const tBanner = document.getElementById('tournament-banner');
                            tBanner.src = tournament.tournament_banner || fallbackT;
                            tBanner.onerror = () => tBanner.src = fallbackT;
                        }
                    }
                } catch (e) { console.error('Load Error:', e); }
            }

            function updateLogoPreview() {
                const img = document.getElementById('team-logo-preview');
                const fallbackLogo = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400';
                if (currentLogoUrl) {
                    img.src = currentLogoUrl;
                    img.onerror = () => img.src = fallbackLogo;
                    img.style.display = 'block';
                }
 else {
                    img.style.display = 'none';
                }
            }

            // Logo Trigger
            document.getElementById('logo-trigger').addEventListener('click', () => {
                const newUrl = prompt('Enter New Logo URL:', currentLogoUrl);
                if (newUrl !== null) {
                    currentLogoUrl = newUrl;
                    updateLogoPreview();
                }
            });

            // --- 2. Update Data ---
            document.getElementById('btn-confirm').addEventListener('click', async () => {
                const payload = {
                    team_name: document.getElementById('input-team-name').value,
                    leader_name: document.getElementById('input-leader-name').value,
                    member_1: document.getElementById('member-1').value,
                    member_2: document.getElementById('member-2').value,
                    member_3: document.getElementById('member-3').value,
                    member_4: document.getElementById('member-4').value,
                    team_banner_url: currentLogoUrl
                };

                try {
                    const res = await fetch(`${API_BASE_URL}/teams/${teamId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        alert('Team updated successfully!');
                        window.location.href = `../TeamDetail Page 13/TeamDetail_13.html?id=${teamId}`;
                    } else {
                        const err = await res.json();
                        alert('Update failed: ' + (err.error || 'Unknown error'));
                    }
                } catch (e) {
                    console.error('Update Error:', e);
                    alert('Could not connect to server.');
                }
            });

            // Cancel
            document.getElementById('btn-cancel').addEventListener('click', () => {
                window.history.back();
            });

            loadData();
        });
    </script>
</body>
</html>
