<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Admin Team Detail - KMITL ESPORT</title>
    <link rel="stylesheet" href="globals13.css" />
    <link rel="stylesheet" href="styleguide13.css" />
    <link rel="stylesheet" href="style13.css" />
    <link rel="stylesheet" href="../../shared-admin.css" />
</head>
<body>
    <!-- Standardized Universal Header from Dashboard -->
    <header class="header-top namespaced-header" role="banner">
        <div class="ns-header-left">
            <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
            <div class="ns-title-wrap">
                <span class="ns-title-text">KMITL ESPORT</span>
            </div>
            <nav class="ns-main-nav" aria-label="Main navigation">
                <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link active">Home</a>
                <a href="#" class="ns-nav-link">Explore</a>
                <a href="#" class="ns-nav-link">News</a>
            </nav>
        </div>
        <div class="ns-header-right">
            <label class="ns-search-box" aria-label="Search tournaments">
                <div class="ns-search-bg">
                    <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                </div>
                <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
            </label>
            <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
        </div>
    </header>

    <div class="layout-wrapper">
        <!-- Standardized Universal Sidebar from TournamentList_9.html -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <img src="../../../icons/stats.svg" alt="Dashboard icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content area -->
        <div class="main-column">
            <main class="content-body">
                <div class="summary-card">
                    <!-- Tournament Header -->
                    <header class="card-header">
                        <div class="banner-box">
                            <img id="tournament-banner-img" class="tournament-banner" src="https://placehold.co/400x300?text=Banner" alt="" onerror="this.style.display='none'; this.parentElement.classList.add('placeholder');" />
                        </div>
                        <div class="header-info">
                            <div class="title-row">
                                <h1 class="tournament-title" id="tournament-display-name">Loading Tournament...</h1>
                                <button class="edit-icon-btn" id="edit-team-btn" title="Edit Team">
                                    <img src="../../../icons/pencil.svg" alt="Edit" />
                                </button>
                            </div>
                            <div class="meta-row">
                                <img class="meta-icon" src="../../../icons/calendar-day.svg" alt="" />
                                <span class="meta-text" id="tournament-date-display">Loading Date...</span>
                            </div>
                            <div class="status-badge-container">
                                <div class="status-badge-pill" id="status-badge">
                                    <span class="status-text">Pending</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <!-- Details Section -->
                    <section class="registration-details">
                        <div class="details-grid">
                            <!-- Left: Team Identity -->
                            <div class="column team-identity">
                                <div class="section-label">
                                    <img src="../../../icons/users.svg" alt="" class="label-icon" />
                                    <span>TEAM IDENTITY</span>
                                </div>
                                <div class="identity-content">
                                    <div class="team-logo-box">
                                        <div id="team-logo-initial" class="logo-initial">-</div>
                                        <img id="team-logo-img" src="" alt="Team Logo" style="display: none;" onerror="this.style.display='none';" />
                                    </div>
                                    <div class="team-name-box">
                                        <span class="box-label">Team Name</span>
                                        <span class="box-value" id="team-name-display">Loading...</span>
                                    </div>
                                </div>
                                <div class="leader-box">
                                    <span class="box-label">Team Leader</span>
                                    <div class="leader-info">
                                        <div class="leader-icon" id="leader-initial-display">-</div>
                                        <span class="leader-name" id="leader-name-display">Loading...</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Right: Team Members -->
                            <div class="column team-members">
                                <div class="section-label">
                                    <img src="../../../icons/users.svg" alt="" class="label-icon" />
                                    <span>TEAM MEMBERS</span>
                                </div>
                                <ul class="member-list" id="member-list-container">
                                    <!-- Populated by JS -->
                                </ul>
                            </div>
                        </div>

                        <!-- Footer Action -->
                        <div class="card-footer">
                            <button class="cancel-btn" id="cancel-action-btn">Cancel</button>
                        </div>
                    </section>
                </div>
            </main>

            <!-- Global Footer -->
            <footer class="global-footer">
                <div class="footer-left">
                    <span class="copyright">© 2026 KMITL ESPORT</span>
                </div>
                <div class="footer-right">
                    <a href="#" class="footer-link">Documentation</a>
                    <a href="#" class="footer-link">API Reference</a>
                    <a href="#" class="footer-link">Support</a>
                </div>
            </footer>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');

            // --- Load Real Team Data ---
            async function loadTeamData() {
                if (!teamId) return;
                try {
                    const res = await fetch(`http://localhost:3000/teams/${teamId}`);
                    const data = await res.json();
                    
                    if (res.ok && data.team) {
                        const team = data.team;
                        // Update Identity
                        document.getElementById('team-name-display').textContent = team.team_name;
                        
                        const logoImg = document.getElementById('team-logo-img');
                        const logoInitial = document.getElementById('team-logo-initial');
                        const fallbackLogo = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400';
                        if (team.team_banner_url && logoImg) {
                            logoImg.src = team.team_banner_url;
                            logoImg.onerror = () => logoImg.src = fallbackLogo;
                            logoImg.style.display = 'block';
                            if (logoInitial) logoInitial.style.display = 'none';
                        } else if (logoInitial) {
                            logoInitial.textContent = team.team_name.substring(0, 1).toUpperCase();
                            logoInitial.style.display = 'flex';
                            if (logoImg) logoImg.style.display = 'none';
                        }
                        
                        // Update Leader
                        document.getElementById('leader-initial-display').textContent = team.leader_name ? team.leader_name.charAt(0).toUpperCase() : '-';
                        document.getElementById('leader-name-display').textContent = team.leader_name || 'No Leader';
                        
                        // Update Members
                        const memberList = document.getElementById('member-list-container');
                        if (memberList) {
                            memberList.innerHTML = '';
                            const members = [team.member_1, team.member_2, team.member_3, team.member_4].filter(m => m);
                            members.forEach((m, index) => {
                                const li = document.createElement('li');
                                li.className = 'member-bar';
                                li.innerHTML = `<span class="member-rank">${index + 1}</span><span class="member-name">${m}</span>`;
                                memberList.appendChild(li);
                            });
                            for(let i = members.length; i < 4; i++) {
                                const li = document.createElement('li');
                                li.className = 'member-bar';
                                li.innerHTML = `<span class="member-rank">${i+1}</span><span class="member-name">-</span>`;
                                memberList.appendChild(li);
                            }
                        }

                        // Tournament Context
                        if (data.applications && data.applications.length > 0) {
                            const app = data.applications[0];
                            const tournament = app.tournament;
                            document.getElementById('tournament-display-name').textContent = tournament.tournament_name;
                            
                            const tBanner = document.getElementById('tournament-banner-img');
                            const fallbackTournament = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200';
                            if (tBanner && tournament.tournament_banner) {
                                tBanner.src = tournament.tournament_banner;
                                tBanner.onerror = () => tBanner.src = fallbackTournament;
                                tBanner.style.display = 'block';
                            }
                            
                            const tDate = document.getElementById('tournament-date-display');
                            if (tDate && tournament.start_date) {
                                tDate.textContent = new Date(tournament.start_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                            }
                            
                            // Badge Status
                            const statusBadge = document.getElementById('status-badge');
                            if (statusBadge) {
                                const badgeText = statusBadge.querySelector('.status-text');
                                if (badgeText) badgeText.textContent = app.status;
                                if (app.status === 'Approved') {
                                    statusBadge.style.background = '#dcfce7'; statusBadge.style.color = '#15803d';
                                } else if (app.status === 'Rejected') {
                                    statusBadge.style.background = '#fee2e2'; statusBadge.style.color = '#b91c1c';
                                } else {
                                    statusBadge.style.background = '#fef08a'; statusBadge.style.color = '#a16207';
                                }
                            }
                        }
                    }
                } catch (error) { console.error('Error:', error); }
            }
            loadTeamData();

            // Navigation
            const editBtn = document.getElementById('edit-team-btn');
            if (editBtn && teamId) {
                editBtn.addEventListener('click', () => {
                    window.location.href = `../EditTeamDetail Page 14/EditTeam_14.html?id=${teamId}`;
                });
            }
            const cancelBtn = document.getElementById('cancel-action-btn');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    window.location.href = '../TeamList Page 12/TeamList_12.html';
                });
            }

            // Approval Interaction
            const badge = document.getElementById('status-badge');
            if (badge && teamId) {
                badge.style.cursor = 'pointer';
                badge.addEventListener('click', async () => {
                    if (confirm('Approve this team?')) {
                        try {
                            const appRes = await fetch(`http://localhost:3000/applications?team_id=${teamId}`);
                            const apps = await appRes.json();
                            if (apps.length > 0) {
                                await fetch(`http://localhost:3000/applications/${apps[0].app_id}/status`, {
                                    method: 'PATCH',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ status: 'Approved' })
                                });
                                window.location.reload();
                            }
                        } catch (e) { console.error(e); }
                    }
                });
            }
        });
    </script>
</body>
</html>
