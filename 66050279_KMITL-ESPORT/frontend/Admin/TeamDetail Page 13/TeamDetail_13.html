                    </div>
                    <div class="container-8">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('id');
            console.log('Team Detail ID:', teamId);

            // --- Load Real Team Data ---
            async function loadTeamData() {
                if (!teamId) return;
                try {
                    const res = await fetch(`http://localhost:3000/teams/${teamId}`);
                    const data = await res.json();
                    
                    if (res.ok && data.team) {
                        const team = data.team;
                        // Update Team Name
                        document.querySelector('.text-wrapper-11').textContent = team.team_name;
                        document.querySelector('.text-wrapper-12').textContent = team.team_name.substring(0, 2).toUpperCase();
                        
                        // Update Leader
                        document.querySelector('.background-4').textContent = team.leader_name.substring(0, 2).toUpperCase();
                        document.querySelector('.text-3').textContent = team.leader_name;
                        
                        // Update Members List
                        const memberList = document.querySelector('.container-12');
                        if (memberList) {
                            memberList.innerHTML = ''; // Clear static members
                            const members = [team.member_1, team.member_2, team.member_3, team.member_4].filter(m => m);
                            members.forEach((m, index) => {
                                const li = document.createElement('li');
                                li.className = 'background-5';
                                li.innerHTML = `
                                    <div class="container-13"><span class="text-5">${index + 1}</span></div>
                                    <div class="div-2"><span class="text-6">${m}</span></div>
                                `;
                                memberList.appendChild(li);
                            });
                        }

                        // Update Tournament context if available
                        if (data.applications && data.applications.length > 0) {
                            const app = data.applications[0];
                            const tournament = app.tournament;
                            const tNameDisplay = document.getElementById('tournament-display-name');
                            if (tNameDisplay) tNameDisplay.textContent = tournament.tournament_name;
                            
                            const tBannerDisplay = document.querySelector('.tournament-header .image');
                            if (tBannerDisplay && tournament.tournament_banner) {
                                tBannerDisplay.src = tournament.tournament_banner;
                            }
                            
                            const tDateDisplay = document.getElementById('tournament-date-display');
                            if (tDateDisplay && tournament.start_date) {
                                const sDate = new Date(tournament.start_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                                tDateDisplay.textContent = sDate;
                            }
                            
                            // Status Badge (Pending / Approved / Rejected)
                            const statusBadge = document.getElementById('status-badge');
                            if (statusBadge) {
                                statusBadge.style.display = 'flex';
                                const badgeText = statusBadge.querySelector('.text-wrapper-10');
                                if (badgeText) badgeText.textContent = app.status;
                                
                                // Reset colors to ensure readability depending on background
                                if (app.status === 'Approved') {
                                    statusBadge.style.background = '#dcfce7'; // green
                                    if (badgeText) badgeText.style.color = '#15803d';
                                } else if (app.status === 'Rejected') {
                                    statusBadge.style.background = '#fee2e2'; // red
                                    if (badgeText) badgeText.style.color = '#b91c1c';
                                } else {
                                    statusBadge.style.background = '#fef08a'; // yellow
                                    if (badgeText) badgeText.style.color = '#a16207';
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error fetching team data:', error);
                }
            }
            loadTeamData();


            
            // Redirection for the edit icon next to the title
            const editIcon = document.querySelector('.edit-icon');
            if (editIcon && teamId) {
                editIcon.style.cursor = 'pointer';
                editIcon.addEventListener('click', (e) => {
                    console.log('Edit icon clicked');
                    window.location.href = `../EditTeamDetail Page 14/EditTeam_14.html?id=${teamId}`;
                });
            }

            // Redirection for the floating edit button (.button-4)
            const floatingEditBtn = document.querySelector('.button-4');
            if (floatingEditBtn && teamId) {
                floatingEditBtn.addEventListener('click', () => {
                    console.log('Floating edit button clicked');
                    window.location.href = `../EditTeamDetail Page 14/EditTeam_14.html?id=${teamId}`;
                });
            }

            // --- Team Approval Logic ---
            const statusBadge = document.querySelector('.button-3'); // This is the "Pending" badge
            console.log('Status badge element:', statusBadge);
            
            if (statusBadge && teamId) {
                statusBadge.style.cursor = 'pointer';
                console.log('Attaching click listener for Team Approval (ID Context):', teamId);
                
                statusBadge.addEventListener('click', async (e) => {
                    console.log('Status badge clicked! Looking for application associated with team:', teamId);
                    e.preventDefault();
                    
                    if (confirm('Do you want to approve this team?')) {
                        try {
                            // Step 1: Find the application for this team
                            const appRes = await fetch(`http://localhost:3000/applications?team_id=${teamId}`);
                            const applications = await appRes.json();
                            console.log('Found applications for team:', applications);

                            if (!applications || applications.length === 0) {
                                alert('This team has not applied for any tournament yet.');
                                return;
                            }

                            // Use the first application found for this team
                            const appId = applications[0].app_id;
                            console.log('Processing approval for application ID:', appId);

                            // Step 2: Update the application status
                            const response = await fetch(`http://localhost:3000/applications/${appId}/status`, {
                                method: 'PATCH',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ status: 'Approved' })
                            });

                            console.log('Response status:', response.status);
                            const result = await response.json();
                            
                            if (response.ok) {
                                alert('Application approved successfully!');
                                window.location.reload();
                            } else {
                                alert(`Failed to approve application: ${result.error || 'Unknown error'}`);
                            }
                        } catch (error) {
                            console.error('Error during application status update fetch:', error);
                            alert('An error occurred. Please check the console for details.');
                        }
                    }
                });
            } else {
                console.warn('Status badge or teamId missing:', { statusBadge: !!statusBadge, teamId });
            }
        });
    </script>
