<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Create Tournament</title>
    <link rel="stylesheet" href="globals11.css" />
    <link rel="stylesheet" href="styleguide11.css" />
    <link rel="stylesheet" href="style11.css" />
</head>

<body>
    <div class="admin-create">
        <!-- Header / Top Navigation -->
        <header class="header-top namespaced-header" role="banner">
    <div class="ns-header-left">
        <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
        <div class="ns-title-wrap">
            <span class="ns-title-text">KMITL ESPORT</span>
        </div>
        <nav class="ns-main-nav" aria-label="Main navigation">
            <a href="../TournamentList Page 9/TournamentList_9.html" class="ns-nav-link">Home</a>
            <a href="#" class="ns-nav-link">Explore</a>
            <a href="#" class="ns-nav-link">News</a>
        </nav>
    </div>
    <div class="ns-header-right">
        <label class="ns-search-box" aria-label="Search tournaments">
            <div class="ns-search-bg">
                <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
            </div>
            <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
        </label>
        <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
    </div>
</header>
        <!-- Sidebar Navigation (decorative/background layer) -->
        
        
        
        
        
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <img src="../../../icons/stats.svg" alt="Dashboard icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Sidebar Navigation (top overlay layer) -->
        
        <!-- Main Form Section -->
        <main class="form-section" aria-label="Create Tournament Form">
            <form novalidate onsubmit="event.preventDefault();">
                <!-- Basic Info -->
                <section class="basic-info" aria-labelledby="basic-info-heading">
                    <div class="container-7">
                        <div class="div-2">
                            <label class="text-wrapper-4" for="tournament-name">Tournament Name</label>
                        </div>
                        <div class="input-2">
                            <div class="div-2">
                                <input class="text-wrapper-5 input-field" id="tournament-name" type="text"
                                    placeholder="e.g. Pro League Winter Finals 2024" aria-required="true" />
                            </div>
                        </div>
                    </div>
                    <div class="container-7">
                        <div class="div-2">
                            <label class="text-wrapper-4" for="tournament-description">Description (Optional)</label>
                        </div>
                        <div class="textarea">
                            <div class="div-2">
                                <textarea class="p textarea-field" id="tournament-description"
                                    placeholder="Briefly describe the rules, prize pool, and format..."
                                    aria-required="false"></textarea>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- Banner Upload -->
                <section class="banner-upload" aria-labelledby="banner-heading" id="banner-dropzone" style="overflow: hidden; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; position: relative;">
                    <div class="div-2">
                        <span class="text-wrapper-4" id="banner-heading">Tournament Banner</span>
                    </div>
                    <div class="overlay-border" role="region" aria-label="File upload area" style="width: 100%; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                        <div id="upload-placeholder" style="display: contents;">
                                <img class="icon" src="../../../icons/cloud-upload-alt.svg" alt="Upload icon" style="width: 48px; height: 48px; margin-bottom: 16px;" />
                            <div class="container-8">
                                <div class="container-9">
                                    <p class="text-8">Click button to enter Image URL</p>
                                </div>
                                <div class="container-9">
                                    <p class="text-9">Recommended size: 1200x400px (Direct Link)</p>
                                </div>
                            </div>
                            <button class="button" type="button" aria-label="Enter image URL" id="select-url-btn">
                                <span class="text-10">Select File</span>
                            </button>
                        </div>

                        <div id="url-input-container" style="display: none; width: 80%; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10;">
                            <div style="font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 8px;">Paste Image URL:</div>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="banner-url-input" placeholder="https://example.com/image.jpg" style="flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; background: white; color: #0f172a;">
                                <button id="confirm-url-btn" type="button" style="padding: 8px 16px; background: #ff8c00; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">Add</button>
                            </div>
                            <button id="cancel-url-btn" type="button" style="margin-top: 10px; background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; text-decoration: underline;">Cancel</button>
                        </div>

                        <div id="banner-preview-container" style="display: none; position: absolute; inset: 0; width: 100%; height: 100%;">
                            <img id="banner-preview-img" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;">
                            <button id="remove-banner-btn" type="button" style="position: absolute; top: 10px; right: 10px; background: rgba(255,140,0,0.9); color: white; border: none; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer;">
                                Change URL
                            </button>
                        </div>
                    </div>
                </section>
                <!-- Format & Rules -->
                <section class="format-rules" aria-labelledby="format-heading">
                    <div class="container-10">
                        <div class="div-2">
                            <span class="text-wrapper-4" id="format-heading">Tournament Type</span>
                        </div>
                        <div class="container-11" role="radiogroup" aria-labelledby="format-heading">
                            <!-- Single Elimination -->
                            <label class="label-2 format-option active" style="cursor: pointer; display: flex; align-items: center; padding: 12px; border: 2px solid #ff8c00; border-radius: 12px; transition: all 0.2s; background: white;" data-type="single-elimination">
                                <div class="selection-indicator" style="width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ff8c00; display: flex; align-items: center; justify-content: center; background: #ff8c00;">
                                    <img class="vector" src="img/vector.svg" alt="" style="width: 10px; display: block;" />
                                </div>
                                <input type="radio" name="tournament-type" value="single-elimination" class="radio-hidden" checked style="display: none;" />
                                <div class="div" style="margin-left: 12px;">
                                    <div class="div-2"><span class="text-11">Single Elimination</span></div>
                                    <div class="div-2"><span class="text-12" style="font-size: 12px; color: #64748b;">Losers are out immediately</span></div>
                                </div>
                            </label>
                            <!-- Double Elimination -->
                            <label class="label-3 format-option" style="cursor: pointer; display: flex; align-items: center; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; margin-top: 10px; background: white;" data-type="double-elimination">
                                <div class="selection-indicator" style="width: 20px; height: 20px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; background: transparent;">
                                    <img class="vector" src="img/vector.svg" alt="" style="width: 10px; display: none;" />
                                </div>
                                <input type="radio" name="tournament-type" value="double-elimination" class="radio-hidden" style="display: none;" />
                                <div class="div" style="margin-left: 12px;">
                                    <div class="div-2"><span class="text-13">Double Elimination</span></div>
                                    <div class="div-2"><span class="text-14" style="font-size: 12px; color: #64748b;">Includes a loser&#39;s bracket</span></div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="container-12">
                        <div class="container-7">
                            <div class="div-2">
                                <label class="text-wrapper-4" for="duration">Duration</label>
                            </div>
                            <div class="div-2">
                                <div class="input-4">
                                    <div class="container-13">
                                        <input class="text-wrapper-5 input-field-plain" id="duration" type="text"
                                            placeholder="e.g. 3 Days" aria-label="Tournament duration" />
                                    </div>
                                </div>
                                <div class="icon-wrapper"><img class="icon-3" src="img/icon-2.svg"
                                        alt="Calendar icon" /></div>
                            </div>
                        </div>
                        <div class="container-7">
                            <div class="div-2">
                                <span class="text-wrapper-4">Age Range</span>
                            </div>
                            <div class="container-14" style="display: flex; align-items: center; gap: 12px; width: 100%;">
                                <div class="input-5" style="display: flex; align-items: center; background: #f8f7f5; border-radius: 32px; border: 1px solid #e2e8f0; padding: 0 16px; flex: 1; height: 56px;">
                                    <select id="min-age" aria-label="Minimum age" style="width: 100%; border: none; background: transparent; outline: none; font-size: 16px; color: #0f172a; cursor: pointer; height: 100%;">
                                        <!-- Options populated by JS -->
                                    </select>
                                </div>
                                <div class="div"><span class="text-16">—</span></div>
                                <div class="input-5" style="display: flex; align-items: center; background: #f8f7f5; border-radius: 32px; border: 1px solid #e2e8f0; padding: 0 16px; flex: 1; height: 56px;">
                                    <select id="max-age" aria-label="Maximum age" style="width: 100%; border: none; background: transparent; outline: none; font-size: 16px; color: #0f172a; cursor: pointer; height: 100%;">
                                        <!-- Options populated by JS -->
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- Registration Window (Used as Start/End Date for backend compatibility) -->
                <section class="registration-window" aria-labelledby="registration-heading">
                    <div class="container-10">
                        <div class="div-2">
                            <label class="text-wrapper-4" for="start-date">Start Date</label>
                        </div>
                        <div class="input-2">
                            <div class="div-2">
                                <input class="text-wrapper-5 input-field" id="start-date" type="date" required />
                            </div>
                        </div>
                    </div>
                    <div class="container-10">
                        <div class="div-2">
                            <label class="text-wrapper-4" for="end-date">End Date</label>
                        </div>
                        <div class="input-2">
                            <div class="div-2">
                                <input class="text-wrapper-5 input-field" id="end-date" type="date" required />
                            </div>
                        </div>
                    </div>
                </section>
                <!-- Actions -->
                <div class="actions">
                    <button class="button-2" type="submit" aria-label="Create Tournament">
                        <div class="button-shadow" aria-hidden="true"></div>
                        <span class="text-wrapper-6">Create Tournament</span>
                    </button>
                </div>
            </form>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-19">
                <span class="text-wrapper-7">© 2026 KMITL ESPORT</span>
            </div>
            <a class="text-wrapper-8" href="#">Documentation</a>
            <a class="text-wrapper-9" href="#">API Reference</a>
            <a class="text-wrapper-10" href="#">Support</a>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            
            // Banner URL logic
            const selectUrlBtn = document.getElementById('select-url-btn');
            const urlInputContainer = document.getElementById('url-input-container');
            const uploadPlaceholder = document.getElementById('upload-placeholder');
            const bannerUrlInput = document.getElementById('banner-url-input');
            const confirmUrlBtn = document.getElementById('confirm-url-btn');
            const cancelUrlBtn = document.getElementById('cancel-url-btn');
            const bannerPreviewContainer = document.getElementById('banner-preview-container');
            const bannerPreviewImg = document.getElementById('banner-preview-img');
            const removeBannerBtn = document.getElementById('remove-banner-btn');

            let currentBannerUrl = '';

            selectUrlBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadPlaceholder.style.display = 'none';
                urlInputContainer.style.display = 'block';
                bannerUrlInput.focus();
            });

            cancelUrlBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                urlInputContainer.style.display = 'none';
                uploadPlaceholder.style.display = 'contents';
            });

            confirmUrlBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const url = bannerUrlInput.value.trim();
                if (url) {
                    currentBannerUrl = url;
                    bannerPreviewImg.src = url;
                    urlInputContainer.style.display = 'none';
                    bannerPreviewContainer.style.display = 'block';
                }
            });

            removeBannerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                currentBannerUrl = '';
                bannerPreviewContainer.style.display = 'none';
                uploadPlaceholder.style.display = 'contents';
                bannerUrlInput.value = '';
            });

            bannerUrlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmUrlBtn.click();
                }
            });

            // Tournament Type Selection Logic
            const formatOptions = document.querySelectorAll('.format-option');
            formatOptions.forEach(option => {
                option.addEventListener('click', (e) => {
                    // Reset all options
                    formatOptions.forEach(opt => {
                        const radio = opt.querySelector('input[type="radio"]');
                        radio.checked = false;
                        opt.classList.remove('active');
                        opt.style.borderColor = '#e2e8f0';
                        
                        const indicator = opt.querySelector('.selection-indicator');
                        if (indicator) {
                            indicator.style.background = 'transparent';
                            indicator.style.borderColor = '#cbd5e1';
                            const checkmark = indicator.querySelector('.vector');
                            if (checkmark) checkmark.style.display = 'none';
                        }
                    });

                    // Set active option
                    option.classList.add('active');
                    option.style.borderColor = '#ff8c00';
                    const radio = option.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.checked = true;
                    }

                    const indicator = option.querySelector('.selection-indicator');
                    if (indicator) {
                        indicator.style.background = '#ff8c00';
                        indicator.style.borderColor = '#ff8c00';
                        const checkmark = indicator.querySelector('.vector');
                        if (checkmark) checkmark.style.display = 'block';
                    }
                });
            });

            // Age Range Dropdown Population
            const minAgeSelect = document.getElementById('min-age');
            const maxAgeSelect = document.getElementById('max-age');
            
            function populateAgeDropdowns() {
                for (let i = 10; i <= 50; i++) {
                    const minOpt = document.createElement('option');
                    minOpt.value = i;
                    minOpt.textContent = i;
                    minAgeSelect.appendChild(minOpt);

                    const maxOpt = document.createElement('option');
                    maxOpt.value = i;
                    maxOpt.textContent = i;
                    maxAgeSelect.appendChild(maxOpt);
                }
                // Set defaults
                minAgeSelect.value = "18";
                maxAgeSelect.value = "25";
            }
            populateAgeDropdowns();

            // Form Submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('tournament-name').value;
                const typeEntry = document.querySelector('input[name="tournament-type"]:checked');
                const type = typeEntry ? typeEntry.value : 'single-elimination';
                const startDate = document.getElementById('start-date').value;
                const endDate = document.getElementById('end-date').value;
                const minAge = minAgeSelect.value;
                const maxAge = maxAgeSelect.value;

                if (!name || !startDate || !endDate) {
                    alert('Please fill in required fields (Name, Start Date, End Date)');
                    return;
                }

                if (parseInt(minAge) > parseInt(maxAge)) {
                    alert('Minimum age cannot be greater than maximum age.');
                    return;
                }

                try {
                    const res = await fetch('http://localhost:3000/tournaments', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            tournament_name: name,
                            tournament_type: type === 'double-elimination' ? 'Double Elimination' : 'Single Elimination',
                            start_date: startDate,
                            end_date: endDate,
                            tournament_banner: currentBannerUrl,
                            age_min: parseInt(minAge),
                            age_max: parseInt(maxAge)
                        })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        alert('Tournament Created Successfully!');
                        window.location.href = '../TournamentList Page 9/TournamentList_9.html';
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (err) {
                    console.error('Error creating tournament', err);
                    alert('Failed to connect to backend.');
                }
            });
        });
    </script>
</body>

</html>
