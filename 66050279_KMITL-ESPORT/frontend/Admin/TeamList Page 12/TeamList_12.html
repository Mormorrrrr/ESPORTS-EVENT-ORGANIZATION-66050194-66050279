<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Team List</title>
    <link rel="stylesheet" href="globals12.css" />
    <link rel="stylesheet" href="styleguide12.css" />
    <link rel="stylesheet" href="style12.css" />
</head>

<body>
    <div class="admin-team-list">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="../../../icons/Logo.png"
                    alt="KMITL ESPORT Logo" />
                <div class="heading-wrapper">
                    <div class="div">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div"><a class="text" href="../Dashboard Page 8/Dashboard_8.html" style="text-decoration: none; color: inherit;">Home</a></div>
                    <div class="div"><a class="text-2" href="#">Explore</a></div>
                    <div class="div"><a class="text-3" href="#">News</a></div>
                </nav>
            </div>
            <div class="container-3">
                <div class="label">
                    <div class="container-4">
                        <div class="background">
                            <div class="div">
                                <img class="icon" src="img/icon-4.svg" alt="Search icon" aria-hidden="true" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User avatar" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">
                <a class="link" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <div class="uis-graph-bar-wrapper">
                        <img class="uis-graph-bar" src="../../../icons/stats.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-wrapper-2">Dashboard</span>
                    </div>
                </a>
                <a class="link" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                    <div class="div">
                        <img class="img" src="../../../icons/trophy-star.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="container-6">
                        <span class="text-wrapper-3">Tournament</span>
                    </div>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html" aria-current="page" aria-label="Teams">
                    <div class="div">
                        <img class="icon-2" src="../../../icons/users.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-wrapper-4">Teams</span>
                    </div>
                </a>
                <a class="link-3" href="#" aria-label="About">
                    <div class="div">
                        <img class="icon-3" src="../../../icons/info.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-5">About</span>
                    </div>
                </a>
                <a class="link-3" href="#" aria-label="Settings">
                    <div class="div">
                        <img class="icon-4" src="../../../icons/settings.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-6">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="tournaments-list-wrapper">
            <section class="tournaments-list" aria-label="Team List">
                <div class="container-7" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div class="div">
                        <h1 class="text-wrapper-5">Team List</h1>
                    </div>
                    <div class="button-wrapper" style="margin: 0;">
                        <button class="button-plus" type="button" aria-label="Add new team" onclick="alert('Funcationality to add team is coming soon!')">
                            <span class="iconstack-io-plus" aria-hidden="true">
                                <img class="vector-plus" src="img/vector.svg" alt="" />
                                <img class="vector-plus-2" src="img/vector-2.svg" alt="" />
                            </span>
                        </button>
                    </div>
                </div>
            </section>
            <!-- Dynamic Team List Container -->
            <div class="container-8" id="admin-team-list-container" style="flex-direction: column; gap: 20px;">
                <!-- Cards injected via JS -->
            </div>
            <div class="container-12"></div>
            <!-- Add Team Button -->
            <button class="iconstack-io-plus-wrapper" type="button" aria-label="Add new team">
                <div class="iconstack-io-plus" aria-hidden="true">
                    <img class="vector" src="img/vector.svg" alt="" />
                    <img class="vector-2" src="img/vector-2.svg" alt="" />
                </div>
            </button>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-13">
                <span class="text-wrapper-8">© 2026 KMITL ESPORT</span>
            </div>
            <a class="text-wrapper-9" href="#">Documentation</a>
            <a class="text-wrapper-10" href="#">API Reference</a>
            <a class="text-wrapper-11" href="#">Support</a>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('admin-team-list-container');
            
            try {
                const res = await fetch('http://localhost:3000/teams');
                const allTeams = await res.json();
                
                listContainer.innerHTML = '';
                
                if (allTeams.length === 0) {
                    listContainer.innerHTML = '<p style="color:white; padding: 20px;">No teams found.</p>';
                    return;
                }

                allTeams.forEach(async (team) => {
                    // Fetch application status for this team
                    let status = 'No Apply';
                    let statusColor = '#94a3b8'; // Grey
                    try {
                        const appRes = await fetch(`http://localhost:3000/applications?team_id=${team.team_id}`);
                        const apps = await appRes.json();
                        if (apps.length > 0) {
                            status = apps[0].status.toUpperCase();
                            if (status === 'APPROVED') statusColor = '#4ade80'; // Green
                            else if (status === 'PENDING') statusColor = '#fbbf24'; // Yellow
                        }
                    } catch (e) {
                        console.error('Error fetching status for team', team.team_id, e);
                    }

                    const article = document.createElement('article');
                    article.className = 'tournament-card';
                    article.innerHTML = `
                        <div class="valorant-tournament-wrapper">
                            <div class="valorant-tournament" style="display:flex; align-items:center; justify-content:center; background:#333;">
                                <span style="font-size: 24px; color: white;">${team.team_name.substring(0,2).toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="container-9">
                            <div class="heading">
                                <span class="text-wrapper-6">${team.team_name}</span>
                            </div>
                            <div class="container-wrapper">
                                <div class="container-10">
                                    <div class="div">
                                        <span class="text-wrapper-7">Leader: ${team.leader_name}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="container-11">
                            <div class="approve-wrapper" style="background-color: ${statusColor};">
                                <span class="approve">${status}</span>
                            </div>
                            <button class="button" type="button" aria-label="Edit" onclick="editTeam(${team.team_id})">
                                <div class="icon-wrapper">
                                    <span style="color:white; font-size:12px;">Edit</span>
                                </div>
                            </button>
                            <button class="button" type="button" aria-label="Delete" onclick="deleteTeam(${team.team_id})">
                                <div class="icon-wrapper">
                                    <span style="color:red; font-size:12px;">Del</span>
                                </div>
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(article);
                });
            } catch (error) {
                console.error('Error fetching teams:', error);
                listContainer.innerHTML = '<p style="color:white; padding: 20px;">Error loading teams.</p>';
            }
        });

        async function deleteTeam(teamId) {
            if (!confirm('Are you sure you want to delete this team?')) return;
            try {
                const res = await fetch(`http://localhost:3000/teams/${teamId}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    alert('Team deleted successfully');
                    location.reload();
                } else {
                    const err = await res.json();
                    alert('Delete failed: ' + err.error);
                }
            } catch (error) {
                console.error('Error deleting team:', error);
                alert('Network error while deleting team');
            }
        }

        function editTeam(teamId) {
            location.href = `../TeamDetail Page 13/TeamDetail_13.html?id=${teamId}`;
        }
    </script>
</body>

</html>
