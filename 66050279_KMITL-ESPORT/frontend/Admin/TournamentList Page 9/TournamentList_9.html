<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Tournament</title>
    <link rel="stylesheet" href="globals9.css" />
    <link rel="stylesheet" href="styleguide9.css" />
    <link rel="stylesheet" href="style9.css?v=3" />
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
    <div class="ns-header-left">
        <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
        <div class="ns-title-wrap">
            <span class="ns-title-text">KMITL ESPORT</span>
        </div>
        <nav class="ns-main-nav" aria-label="Main navigation">
            <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link">Home</a>
            <a href="#" class="ns-nav-link">Explore</a>
            <a href="#" class="ns-nav-link">News</a>
        </nav>
    </div>
    <div class="ns-header-right">
        <label class="ns-search-box" aria-label="Search tournaments">
            <div class="ns-search-bg">
                <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
            </div>
            <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
        </label>
        <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
    </div>
</header>
        <!-- Sidebar -->
        
        
        
        
        
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <img src="../../../icons/stats.svg" alt="Dashboard icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link" href="TournamentList_9.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="tournaments-list-wrapper" style="max-width: 928px; width: 100%; display: flex; flex-direction: column;">
            <section style="position: relative; margin-top: 32px; display: flex;" aria-label="Tournament List">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding-bottom: 24px;">
                    <div style="display:flex; align-items:center;">
                        <h1 style=" font-weight: 700; font-size: 24px; color: #0f172a; margin: 0;">Tournaments List</h1>
                    </div>
                    <div style="margin: 0; display:flex;">
                        <button type="button" aria-label="Add new tournament" onclick="window.location.href='../CreateTournament Page 11/CreateTournament_11.html'" style="display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:50%; background-color:#ff8c00; border:none; cursor:pointer; box-shadow: 0 2px 4px rgba(255,140,0,0.3);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                </div>
            </section>
            <!-- Dynamic List Container -->
            <div id="admin-tournaments-list" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
                <!-- Tournaments dynamically injected here -->
            </div>
        </main>

    </div>
    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('admin-tournaments-list');
            try {
                const res = await fetch(`${API_BASE_URL}/tournaments`);
                if (!res.ok) throw new Error('Failed to fetch tournaments');
                const tournaments = await res.json();
                
                listContainer.innerHTML = '';
                
                if (tournaments.length === 0) {
                    listContainer.innerHTML = '<li style="color:white; padding: 20px;">No tournaments found.</li>';
                    return;
                }

                tournaments.forEach(t => {
                    const startDateText = new Date(t.start_date).toLocaleDateString();
                    const endDateText = new Date(t.end_date).toLocaleDateString();

                    const article = document.createElement('div');
                    article.style.display = 'flex';
                    article.style.alignItems = 'center';
                    article.style.justifyContent = 'space-between';
                    article.style.padding = '16px 24px';
                    article.style.backgroundColor = '#ffffff';
                    article.style.borderRadius = '16px';
                    article.style.border = '1px solid #f1f5f9';
                    article.style.boxShadow = '0px 1px 2px rgba(0,0,0,0.05)';
                    article.style.width = '100%';
                    article.style.boxSizing = 'border-box';
                    
                    const fallbackBanner = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800';
                    const displayBanner = t.tournament_banner || fallbackBanner;
                    const bannerHtml = `<img src="${displayBanner}" alt="${t.tournament_name} Banner" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='${fallbackBanner}'">`;

                    const leftSide = `
                        <div style="display:flex; align-items:center; gap: 24px;">
                            <div style="width: 64px; height: 64px; border-radius: 50%; background-color: #333; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;">
                                ${bannerHtml}
                            </div>
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                <span style="font-size: 16px; font-weight: 700; color: #0f172a; ">${t.tournament_name}</span>
                                <span style="font-size: 14px; color: #64748b;  display:flex; align-items:center; gap: 4px;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    ${startDateText} - ${endDateText}
                                </span>
                            </div>
                        </div>
                    `;

                    const rightSide = `
                        <div style="display:flex; align-items:center; gap: 16px;">
                            <div style="background-color: #e0e7ff; padding: 4px 12px; border-radius: 9999px; display:flex; align-items:center; justify-content:center;">
                                <span style="color: #4338ca; font-size: 11px; font-weight: 700;  text-transform: uppercase;">${t.tournament_type}</span>
                            </div>
                            <button onclick="window.location.href='../TournamentDetail Page 10/TournamentDetail_10.html?id=${t.tournament_id}'" style="width: 36px; height: 36px; border-radius: 50%; background-color: #f1f5f9; border: none; cursor: pointer; display:flex; align-items:center; justify-content:center; padding:0;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button onclick="deleteTournament(${t.tournament_id})" style="width: 36px; height: 36px; border-radius: 50%; background-color: #f1f5f9; border: none; cursor: pointer; display:flex; align-items:center; justify-content:center; padding:0;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;

                    article.innerHTML = leftSide + rightSide;
                    listContainer.appendChild(article);
                });
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<li style="color:red; padding:20px;">Error loading tournaments. Ensure backend server is running.</li>';
            }
        });

        window.deleteTournament = async function(id) {
            if (!confirm('Are you sure you want to delete this tournament?')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/tournaments/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    alert('Tournament deleted successfully');
                    window.location.reload();
                } else {
                    const data = await res.json();
                    alert('Error: ' + (data.error || 'Failed to delete'));
                }
            } catch (err) {
                console.error(err);
                alert('Failed to connect to backend.');
            }
        };
    </script>
</body>

</html>
