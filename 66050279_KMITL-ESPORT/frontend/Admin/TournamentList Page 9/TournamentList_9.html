<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Tournament</title>
    <link rel="stylesheet" href="globals9.css" />
    <link rel="stylesheet" href="styleguide9.css" />
    <link rel="stylesheet" href="style9.css" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="../../../icons/Logo.png"
                    alt="KMITL ESPORT Logo" />
                <div class="heading-wrapper">
                    <div class="div">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div"><a class="text" href="../Dashboard Page 8/Dashboard_8.html" style="text-decoration: none; color: inherit;">Home</a></div>
                    <div class="div"><span class="text-2">Explore</span></div>
                    <div class="div"><span class="text-3">News</span></div>
                </nav>
            </div>
            <div class="container-3">
                <div class="label">
                    <div class="container-4">
                        <div class="background">
                            <div class="div">
                                <img class="icon" src="img/image.svg" alt="Search icon" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User profile" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">
                <a class="link" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                    <div class="uis-graph-bar-wrapper">
                        <img class="uis-graph-bar" src="../../../icons/stats.svg" alt="Dashboard icon" />
                    </div>
                    <div class="div">
                        <span class="text-wrapper-2">Dashboard</span>
                    </div>
                </a>
                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament" aria-current="page">
                    <div class="div">
                        <img class="img" src="../../../icons/trophy-star.svg" alt="Tournament icon" />
                    </div>
                    <div class="container-6">
                        <span class="text-wrapper-3">Tournament</span>
                    </div>
                </a>
                <a class="link-3" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <div class="div">
                        <img class="icon-2" src="../../../icons/users.svg" alt="Teams icon" />
                    </div>
                    <div class="div">
                        <span class="text-5">Teams</span>
                    </div>
                </a>
                <a class="link-3" href="#about" aria-label="About">
                    <div class="div">
                        <img class="icon-3" src="../../../icons/info.svg" alt="About icon" />
                    </div>
                    <div class="div">
                        <span class="text-6">About</span>
                    </div>
                </a>
                <a class="link-3" href="#settings" aria-label="Settings">
                    <div class="div">
                        <img class="icon-4" src="../../../icons/settings.svg" alt="Settings icon" />
                    </div>
                    <div class="div">
                        <span class="text-7">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="tournaments-list-wrapper">
            <section class="tournaments-list" aria-labelledby="tournaments-heading">
                <div class="container-7" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div class="div">
                        <h1 class="text-wrapper-4" id="tournaments-heading">Tournaments List</h1>
                    </div>
                    <div class="button-wrapper" style="margin: 0;">
                        <button class="button" type="button" aria-label="Add new tournament" onclick="window.location.href='../CreateTournament Page 11/CreateTournament_11.html'">
                            <span class="iconstack-io-plus" aria-hidden="true">
                                <img class="vector" src="img/vector.svg" alt="" />
                                <img class="vector-2" src="img/vector-2.svg" alt="" />
                            </span>
                        </button>
                    </div>
                </div>
                <ul class="container-8" id="admin-tournaments-list" aria-label="Tournament list" style="flex-direction: column; gap: 20px;">
                    <!-- Tournaments dynamically injected here -->
                </ul>
            </section>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-14">
                <span class="text-wrapper-6">© 2026 KMITL ESPORT</span>
            </div>
            <span class="text-wrapper-7">Documentation</span>
            <span class="text-wrapper-8">API Reference</span>
            <span class="text-wrapper-9">Support</span>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('admin-tournaments-list');
            try {
                const res = await fetch('http://localhost:3000/tournaments');
                if (!res.ok) throw new Error('Failed to fetch tournaments');
                const tournaments = await res.json();
                
                listContainer.innerHTML = '';
                
                if (tournaments.length === 0) {
                    listContainer.innerHTML = '<li style="color:white; padding: 20px;">No tournaments found.</li>';
                    return;
                }

                tournaments.forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'tournament-card';
                    
                    const startDateText = new Date(t.start_date).toLocaleDateString();
                    const endDateText = new Date(t.end_date).toLocaleDateString();

                    li.innerHTML = `
                        <div class="container-9" style="background:#555; display:flex; align-items:center; justify-content:center; border-radius:10px;">
                            <span style="font-size:24px; color:white; font-weight:bold;">${t.tournament_name.substring(0,2).toUpperCase()}</span>
                        </div>
                        <div class="container-10">
                            <div class="heading">
                                <span class="text-wrapper-5">${t.tournament_name} (${t.tournament_type})</span>
                            </div>
                            <div class="container-11">
                                <div class="container-12">
                                    <div class="div">
                                        <span style="color:#aaa; font-size:12px;">Date:</span>
                                    </div>
                                    <div class="div">
                                        <time class="p">${startDateText} - ${endDateText}</time>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:10px; padding:10px; justify-content:center;">
                            <button class="button" onclick="window.location.href='../TournamentDetail Page 10/TournamentDetail_10.html?id=${t.tournament_id}'" style="background:#0056b3; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Edit</button>
                            <button class="button" onclick="deleteTournament(${t.tournament_id})" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Delete</button>
                        </div>
                    `;
                    listContainer.appendChild(li);
                });
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<li style="color:red; padding:20px;">Error loading tournaments. Ensure backend server is running.</li>';
            }
        });

        window.deleteTournament = async function(id) {
            if (!confirm('Are you sure you want to delete this tournament?')) return;
            try {
                const res = await fetch(`http://localhost:3000/tournaments/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    alert('Tournament deleted successfully');
                    window.location.reload();
                } else {
                    const data = await res.json();
                    alert('Error: ' + (data.error || 'Failed to delete'));
                }
            } catch (err) {
                console.error(err);
                alert('Failed to connect to backend.');
            }
        };
    </script>
</body>

</html>
