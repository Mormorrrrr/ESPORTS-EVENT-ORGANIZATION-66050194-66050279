<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tournament | KMITL ESPORT Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8c00;
            --primary-hover: #e67e00;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --sidebar-width: 260px;
            --header-height: 73px;
        }

        /* Reset and Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .admin-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-body {
            display: flex;
            margin-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
        }

        /* Content Area */
        .content-modern {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-section {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .form-header { margin-bottom: 32px; }
        .form-header h1 { font-size: 28px; font-weight: 800; }

        .form-group { margin-bottom: 24px; }
        .label-modern { display: block; font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 8px; }
        
        .input-modern {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            outline: none;
        }
        .input-modern:focus { border-color: var(--primary); background: white; }

        /* Format Options */
        .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .format-card {
            cursor: pointer;
            border: 2px solid var(--border);
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .format-card.active { border-color: var(--primary); background: #fff7ed; }
        .inner-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--primary); display: none; }
        .format-card.active .inner-dot { display: block; }
        .indicator { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; }
        .format-card.active .indicator { border-color: var(--primary); }

        /* Actions */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 40px;
            padding: 0 10px;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border: none;
            padding: 12px 40px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Footer */
        .footer-modern {
            width: 100%;
            max-width: 600px;
            margin-top: 80px;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            color: var(--text-sub);
            font-size: 14px;
        }
    </style>
    <link rel="stylesheet" href="../../shared-admin.css" />
</head>
<body>
    <div class="admin-layout">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
            </div>
        </header>

        <div class="main-body">
            <!-- Sidebar -->
            <aside class="aside-sidebar" aria-label="Sidebar navigation">
                <nav class="sidebar-nav-container">
                    <a class="link-2" href="../Dashboard Page 8/Dashboard_8.html" aria-label="Dashboard">
                        <img src="../../../icons/stats.svg" alt="Dashboard icon" />
                        <span class="sidebar-text">Dashboard</span>
                    </a>
                    <a class="link" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                        <img src="../../../icons/trophy-star.svg" alt="Tournament icon" />
                        <span class="sidebar-text">Tournament</span>
                    </a>
                    <a class="link-2" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                        <img src="../../../icons/users.svg" alt="Teams icon" />
                        <span class="sidebar-text">Teams</span>
                    </a>
                    <a class="link-2" href="#" aria-label="About">
                        <img src="../../../icons/info.svg" alt="About icon" />
                        <span class="sidebar-text">About</span>
                    </a>
                    <a class="link-2" href="#" aria-label="Settings">
                        <img src="../../../icons/settings.svg" alt="Settings icon" />
                        <span class="sidebar-text">Settings</span>
                    </a>
                </nav>
            </aside>

            <main class="content-modern">
                <section class="form-section">
                    <div class="form-header">
                        <h1>Edit Tournament</h1>
                        <p>Update the details for your esport event.</p>
                    </div>

                    <form id="edit-tournament-form">
                        <div class="form-group">
                            <label class="label-modern" for="tournament-name">Tournament Name</label>
                            <input class="input-modern" id="tournament-name" type="text" required />
                        </div>

                        <div class="form-group">
                            <label class="label-modern">Tournament Type</label>
                            <div class="format-grid">
                                <label class="format-option format-card" data-type="single-elimination">
                                    <div class="indicator"><div class="inner-dot"></div></div>
                                    <input type="radio" name="tournament-type" value="single-elimination" style="display: none;">
                                    <span style="font-weight: 700;">Single Elimination</span>
                                </label>
                                <label class="format-option format-card" data-type="double-elimination">
                                    <div class="indicator"><div class="inner-dot"></div></div>
                                    <input type="radio" name="tournament-type" value="double-elimination" style="display: none;">
                                    <span style="font-weight: 700;">Double Elimination</span>
                                </label>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                            <div class="form-group">
                                <label class="label-modern" for="start-date">Start Date</label>
                                <input class="input-modern" id="start-date" type="date" required />
                            </div>
                            <div class="form-group">
                                <label class="label-modern" for="end-date">End Date</label>
                                <input class="input-modern" id="end-date" type="date" required />
                            </div>
                        </div>

                        <div class="form-actions">
                            <button class="btn-cancel" type="button" onclick="location.href='../TournamentList Page 9/TournamentList_9.html'">Cancel</button>
                            <button class="btn-submit" type="button" id="submit-edit-btn">Update Tournament</button>
                        </div>
                    </form>
                </section>


            </main>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tournamentId = urlParams.get('id');
            if(!tournamentId) {
                alert('No Tournament ID specified');
                location.href = '../TournamentList Page 9/TournamentList_9.html';
                return;
            }

            const formatOptions = document.querySelectorAll('.format-option');
            const setActiveType = (type) => {
                // type comes from backend as 'Single Elimination' or 'Double Elimination'
                const targetType = type.includes('Double') ? 'double-elimination' : 'single-elimination';
                formatOptions.forEach(opt => {
                    const isMatch = opt.getAttribute('data-type') === targetType;
                    const radio = opt.querySelector('input');
                    radio.checked = isMatch;
                    if(isMatch) opt.classList.add('active');
                    else opt.classList.remove('active');
                });
            };

            // Load Data
            try {
                const res = await fetch(`${API_BASE_URL}/tournaments/${tournamentId}`);
                if(!res.ok) throw new Error('Tournament not found');
                const t = await res.json();

                if (t.tournament_name) document.getElementById('tournament-name').value = t.tournament_name;
                if (t.start_date) document.getElementById('start-date').value = t.start_date.substring(0, 10);
                if (t.end_date) document.getElementById('end-date').value = t.end_date.substring(0, 10);
                if (t.tournament_type) setActiveType(t.tournament_type);
            } catch (err) { 
                console.error(err);
                alert('Error loading tournament: ' + err.message); 
            }

            // Type Switching
            formatOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    setActiveType(opt.getAttribute('data-type') === 'double-elimination' ? 'Double Elimination' : 'Single Elimination');
                });
            });

            // Prevent Enter key from submitting the form accidentally
            const form = document.getElementById('edit-tournament-form');
            form.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
            });

            // Update
            document.getElementById('submit-edit-btn').addEventListener('click', async (e) => {
                e.preventDefault();
                const name = document.getElementById('tournament-name').value;
                const startDate = document.getElementById('start-date').value;
                const endDate = document.getElementById('end-date').value;
                const checkedRadio = document.querySelector('input[name="tournament-type"]:checked');
                const typeInput = checkedRadio ? checkedRadio.value : 'single-elimination';
                const finalType = typeInput === 'double-elimination' ? 'Double Elimination' : 'Single Elimination';

                if(!name || !startDate || !endDate) return alert('Please fill all fields');

                try {
                    const res = await fetch(`${API_BASE_URL}/tournaments/${tournamentId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tournament_name: name,
                            tournament_type: finalType,
                            start_date: startDate,
                            end_date: endDate
                        })
                    });
                    if(res.ok) {
                        alert('Updated successfully');
                        location.href = '../TournamentList Page 9/TournamentList_9.html';
                    } else {
                        const errData = await res.json();
                        alert('Update failed: ' + (errData.error || 'Unknown error'));
                    }
                } catch (err) { 
                    console.error(err);
                    alert('Network error'); 
                }
            });
        });
    </script>
</body>
</html>
