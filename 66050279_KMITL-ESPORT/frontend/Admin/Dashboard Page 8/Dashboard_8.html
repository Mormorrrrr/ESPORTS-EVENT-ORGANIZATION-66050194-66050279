<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT Admin Dashboard</title>
    <link rel="stylesheet" href="globals8.css?v=2" />
    <link rel="stylesheet" href="styleguide8.css?v=2" />
    <link rel="stylesheet" href="style8.css?v=2" />
    <link rel="stylesheet" href="../../shared-admin.css" />
</head>

<body>
    <div class="admin-dashboard">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
    <div class="ns-header-left">
        <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
        <div class="ns-title-wrap">
            <span class="ns-title-text">KMITL ESPORT</span>
        </div>
        <nav class="ns-main-nav" aria-label="Main navigation">
            <a href="../Dashboard Page 8/Dashboard_8.html" class="ns-nav-link">Home</a>
            <a href="#" class="ns-nav-link">Explore</a>
            <a href="#" class="ns-nav-link">News</a>
        </nav>
    </div>
    <div class="ns-header-right">
        <label class="ns-search-box" aria-label="Search tournaments">
            <div class="ns-search-bg">
                <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
            </div>
            <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
        </label>
        <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
    </div>
</header>

        <!-- Sidebar -->
        
        
        
        
        
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="Dashboard_8.html" aria-label="Dashboard">
                    <img src="../../../icons/stats.svg" alt="Dashboard icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Dashboard</span>
                </a>
                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="frame">
            <div class="container-7">
                <!-- Stats Grid -->
                                <section class="stats-grid" aria-label="Statistics overview">
                    <article class="background-border" onclick="window.location.href='../TournamentList Page 9/TournamentList_9.html'" style="cursor: pointer;">
                        <div class="overlay">
                            <img class="icon-5" src="../../../icons/trophy-star.svg" alt="Tournaments icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-wrapper-4">Total Tournaments</span>
                        </div>
                        <div class="heading">
                            <span class="text-8" id="total-tournaments">0</span>
                        </div>
                    </article>
                    <article class="background-border" onclick="window.location.href='../TeamList Page 12/TeamList_12.html'" style="cursor: pointer;">
                        <div class="overlay">
                            <img class="icon-5" src="../../../icons/users.svg" alt="Teams icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-wrapper-4">Total Teams</span>
                        </div>
                        <div class="heading">
                            <span class="text-8" id="total-teams">0</span>
                        </div>
                    </article>
                    <article class="background-border">
                        <div class="overlay">
                            <img class="icon-5" src="../../../icons/users.svg" alt="Players icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-wrapper-4">Total Players</span>
                        </div>
                        <div class="heading">
                            <span class="text-8" id="total-players">0</span>
                        </div>
                    </article>
                </section>

                <!-- Upcoming Matches -->
                <section class="section" aria-label="Upcoming Matches">
                    <div class="matches-header">
                        <div class="heading-2">
                            <div class="icon-wrapper">
                                <img class="icon-7" src="../../../icons/calendar-day.svg" alt="Upcoming matches icon" />
                            </div>
                            <h2 class="text-wrapper-5">Upcoming Matches</h2>
                        </div>
                        <button class="button" type="button" onclick="window.location.href='../MatchViewAll Page 19/matchviewall_19.html'">
                            <span class="text-wrapper-7">View All</span>
                            <img class="icon-8" src="../../../icons/arrow-right.svg" alt="Arrow" />
                        </button>
                    </div>
                    
                    <div class="container-11" id="recent-matches-container">
                        <!-- Matches will be injected here -->
                        <p style="color:#94a3b8; padding: 20px; text-align: center; width: 100%;">No matches scheduled yet.</p>
                    </div>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-17">
                <span class="text-wrapper-8">© 2026 KMITL ESPORT</span>
            </div>
            <span class="text-wrapper-9">Documentation</span>
            <span class="text-wrapper-10">API Reference</span>
            <span class="text-wrapper-11">Support</span>
        </footer>
    </div>
    <script>
        async function fetchDashboardStats() {
            try {
                const [tournamentsRes, teamsRes, usersRes] = await Promise.all([
                    fetch('http://localhost:3000/tournaments'),
                    fetch('http://localhost:3000/teams'),
                    fetch('http://localhost:3000/users')
                ]);

                if (tournamentsRes.ok && teamsRes.ok && usersRes.ok) {
                    const tournaments = await tournamentsRes.json();
                    const teams = await teamsRes.json();
                    const users = await usersRes.json();

                    document.getElementById('total-tournaments').textContent = tournaments.length;
                    document.getElementById('total-teams').textContent = teams.length;
                    document.getElementById('total-players').textContent = users.length;
                } else {
                    console.error('Failed to fetch dashboard stats');
                }
            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardStats);
    </script>
</body>

</html>
