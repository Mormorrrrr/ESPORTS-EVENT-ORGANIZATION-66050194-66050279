<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT Admin Dashboard</title>
    <link rel="stylesheet" href="globals8.css?v=2" />
    <link rel="stylesheet" href="styleguide8.css?v=2" />
    <link rel="stylesheet" href="style8.css?v=2" />
</head>

<body>
    <div class="admin-dashboard">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="../../../icons/Logo.png"
                    alt="KMITL ESPORT Logo" />
                <div class="div">
                    <div class="div-2">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div-2"><a class="text" href="Dashboard_8.html" style="text-decoration: none; color: inherit;">Home</a></div>
                    <div class="div-2"><span class="text-2">Explore</span></div>
                    <div class="div-2"><span class="text-3">News</span></div>
                </nav>
            </div>
            <div class="container-3">
                <label class="label" aria-label="Search tournaments">
                    <div class="container-4">
                        <div class="background">
                            <div class="div-2">
                                <img class="icon" src="img/icon.svg" alt="Search icon" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </label>
                <img class="image-background" src="img/image-background-border.svg" alt="User avatar" />
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">
                <a class="link" href="Dashboard_8.html" aria-current="page">
                    <div class="uis-graph-bar-wrapper">
                        <img class="uis-graph-bar" src="../../../icons/stats.svg" alt="Dashboard icon" />
                    </div>
                    <div class="div-2">
                        <span class="text-wrapper-2">Dashboard</span>
                    </div>
                </a>
                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html">
                    <div class="div-2">
                        <img class="img" src="../../../icons/trophy-star.svg" alt="Tournament icon" />
                    </div>
                    <div class="container-6">
                        <span class="text-wrapper-3">Tournament</span>
                    </div>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html">
                    <div class="div-2">
                        <img class="icon-2" src="../../../icons/users.svg" alt="Teams icon" />
                    </div>
                    <div class="div-2">
                        <span class="text-5">Teams</span>
                    </div>
                </a>
                <a class="link-2" href="#">
                    <div class="div-2">
                        <img class="icon-3" src="../../../icons/info.svg" alt="About icon" />
                    </div>
                    <div class="div-2">
                        <span class="text-6">About</span>
                    </div>
                </a>
                <a class="link-2" href="#">
                    <div class="div-2">
                        <img class="icon-4" src="../../../icons/settings.svg" alt="Settings icon" />
                    </div>
                    <div class="div-2">
                        <span class="text-7">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="frame">
            <div class="container-7">
                <!-- Stats Grid -->
                <section class="stats-grid" aria-label="Statistics overview">
                    <article class="background-border" onclick="window.location.href='../TournamentList Page 9/TournamentList_9.html'" style="cursor: pointer;">
                        <div class="overlay">
                            <img class="icon-5" src="img/icon-5.svg" alt="Tournaments icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-wrapper-4">Total Tournaments</span>
                        </div>
                        <div class="heading">
                            <span class="text-8" id="total-tournaments">0</span>
                        </div>
                    </article>
                    <article class="background-border" onclick="window.location.href='../TeamList Page 12/TeamList_12.html'" style="cursor: pointer;">
                        <div class="overlay">
                            <img class="icon-6" src="img/icon-9.svg" alt="Teams icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-9">Total Teams</span>
                        </div>
                        <div class="heading">
                            <span class="text-10" id="total-teams">0</span>
                        </div>
                    </article>
                    <article class="background-border-2">
                        <div class="overlay">
                            <img class="icon-3" src="img/icon-7.svg" alt="Players icon" />
                        </div>
                        <div class="container-8">
                            <span class="text-11">Total Players</span>
                        </div>
                        <div class="heading">
                            <span class="text-12" id="total-players">0</span>
                        </div>
                    </article>
                </section>

                <!-- Upcoming Matches -->
                <section class="section" aria-label="Upcoming Matches">
                    <div class="matches-header">
                        <div class="heading-2">
                            <div class="icon-wrapper">
                                <img class="icon-7" src="img/icon-2.svg" alt="Upcoming matches icon" />
                            </div>
                            <h2 class="text-wrapper-5">Upcoming Matches</h2>
                        </div>
                        <button class="button" type="button" onclick="window.location.href='../MatchViewAll Page 19/matchviewall_19.html'">
                            <span class="text-wrapper-7">View All</span>
                            <img class="icon-8" src="img/image.svg" alt="Arrow" />
                        </button>
                    </div>
                    
                    <div class="container-11" id="recent-matches-container">
                        <!-- Matches will be injected here -->
                        <p style="color:#94a3b8; padding: 20px; text-align: center; width: 100%;">No matches scheduled yet.</p>
                    </div>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-17">
                <span class="text-wrapper-8">© 2026 KMITL ESPORT</span>
            </div>
            <span class="text-wrapper-9">Documentation</span>
            <span class="text-wrapper-10">API Reference</span>
            <span class="text-wrapper-11">Support</span>
        </footer>
    </div>
    <script>
        async function fetchDashboardStats() {
            try {
                const [tournamentsRes, teamsRes, usersRes] = await Promise.all([
                    fetch('http://localhost:3000/tournaments'),
                    fetch('http://localhost:3000/teams'),
                    fetch('http://localhost:3000/users')
                ]);

                if (tournamentsRes.ok && teamsRes.ok && usersRes.ok) {
                    const tournaments = await tournamentsRes.json();
                    const teams = await teamsRes.json();
                    const users = await usersRes.json();

                    document.getElementById('total-tournaments').textContent = tournaments.length;
                    document.getElementById('total-teams').textContent = teams.length;
                    document.getElementById('total-players').textContent = users.length;
                } else {
                    console.error('Failed to fetch dashboard stats');
                }
            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardStats);
    </script>
</body>

</html>
