<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Teams</title>
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../../User/Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Viewer/Tournament Page 17/tournament_17.html";}}
            </script>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../../User/Tournament List Page 1/userlogin_1.html">
                    <img src="../../../icons/trophy-star.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="../../User/Team(noHave) Page 3/Teamnohave_3.html">
                    <img src="../../../icons/users.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#">
                    <img src="../../../icons/info.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#">
                    <img src="../../../icons/settings.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="standardized-main-content">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center;">
                <div style="background: #f8fafc; padding: 40px; border-radius: 24px; border: 1px solid #e2e8f0; max-width: 400px;">
                    <img src="../../../icons/users.svg" alt="" style="width: 64px; height: 64px; opacity: 0.2; margin-bottom: 24px;" />
                    <h2 style="font-size: 24px; color: #1e293b; margin-bottom: 12px; font-weight: 700;">No Teams Found</h2>
                    <p style="font-size: 16px; color: #64748b; margin-bottom: 32px; line-height: 1.5;">You haven't created or joined any teams yet. Start your journey by forming a new squad!</p>
                    <button class="button" type="button" onclick="window.location.href='../CreateTeamStep1 Page 4/createteamStep1_4.html'" style="width: 100%; justify-content: center;">
                        <span class="text">Create a Team</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
             const userStr = localStorage.getItem('user');
             if (userStr) {
                 const user = JSON.parse(userStr);
                 // Admin should go to admin team list
                 if ((user.role || '').toLowerCase() === 'admin') {
                     window.location.href = '../../Admin/TeamList Page 12/TeamList_12.html';
                     return;
                 }
                 try {
                     const res = await fetch(`${API_BASE_URL}/teams`);
                     const allTeams = await res.json();
                     const myTeams = allTeams.filter(t => t.created_by === user.user_id);
                     if (myTeams.length > 0) {
                         window.location.href = '../Team(Have) Page 6/HistoryTeam_6.html';
                     }
                 } catch(e) {}
             }
        });
    </script>
</body>

</html>

</html>
