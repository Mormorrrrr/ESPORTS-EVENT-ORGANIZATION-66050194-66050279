<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Confirm Team</title>
    <!-- Reusing Shared Admin Styles and Custom Page 5 Styles -->
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
    <link rel="stylesheet" href="style5.css?v=3" />
</head>

<body class="user-create-team">
    <div class="admin-create">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament List Page 1/userlogin_1.html" class="ns-nav-link">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Login Page/login.html";}}
            </script>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="../Team(Have) Page 6/HistoryTeam_6.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Progress Stepper -->
        <section class="progress-stepper" aria-label="Registration progress">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: 700; font-size: 14px; color: #0f172a;">Step 2 of 2</span>
                <span style="font-weight: 700; font-size: 14px; color: #64748b;">100% Complete</span>
            </div>
            <div style="height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; margin-bottom: 12px;">
                <div style="width: 100%; height: 100%; background: #ff8c00; border-radius: 4px;"></div>
            </div>
            <span style="color: #64748b; font-size: 13px;">Please double check your information before confirming.</span>
        </section>

        <!-- Main Content Group -->
        <main class="group" aria-label="Team registration summary">
            <!-- Summary Card -->
            <article class="summary-card">
                <!-- Tournament Header -->
                <div class="tournament-header">
                    <img id="tourney-banner" src="https://placehold.co/1200x400?text=Tournament+Banner" alt="Tournament banner" />
                    <div class="container-3">
                        <div class="overlay-2">
                            <span>TOURNAMENT SELECTED</span>
                        </div>
                        <h2 id="tourney-name">Loading...</h2>
                        <div class="tournament-meta">
                            <img src="../../../icons/daily-calendar.svg" alt="Calendar" style="width: 18px; height: 18px;" />
                            <span id="summary-tournament-date">Active Season</span>
                        </div>
                    </div>
                </div>

                <!-- Registration Details Grid -->
                <div class="registration-details">
                    <!-- Team Identity -->
                    <section class="team-identity">
                        <div class="heading">
                            <img src="../../../icons/users.svg" alt="" style="width: 18px;" />
                            <span>TEAM IDENTITY</span>
                        </div>
                        <div class="background-2">
                            <span style="font-size: 12px; color: #94a3b8; font-weight: 500;">Team Name</span>
                            <span id="confirm-team-name" style="font-size: 20px; color: #1e293b; font-weight: 800;">-</span>
                        </div>
                        <div class="background-3">
                            <span style="font-size: 12px; color: #94a3b8; font-weight: 500;">Team Leader</span>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div id="leader-initials-bg" style="width: 32px; height: 32px; background: #ff8c00; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 11px;">-</div>
                                <span id="confirm-leader-name" style="font-size: 18px; color: #1e293b; font-weight: 700;">-</span>
                            </div>
                        </div>
                        <div style="margin-top: 8px;">
                            <span style="font-size: 12px; color: #94a3b8; font-weight: 500; display: block; margin-bottom: 8px;">Team Emblem</span>
                            <img id="team-logo-preview" src="../../../icons/users.svg" alt="Logo" style="width: 80px; height: 80px; object-fit: contain; border-radius: 12px; background: #f8fafc; padding: 12px; border: 1px solid #f1f5f9;" />
                        </div>
                    </section>

                    <!-- Team Members -->
                    <section class="team-members">
                        <div class="heading">
                            <img src="../../../icons/users.svg" alt="" style="width: 18px;" />
                            <span>TEAM MEMBERS</span>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <div class="background-5">
                                <span>1</span>
                                <span id="member-1" style="color: #334155; font-weight: 600;">-</span>
                            </div>
                            <div class="background-5">
                                <span>2</span>
                                <span id="member-2" style="color: #334155; font-weight: 600;">-</span>
                            </div>
                            <div class="background-5">
                                <span>3</span>
                                <span id="member-3" style="color: #334155; font-weight: 600;">-</span>
                            </div>
                            <div class="background-5">
                                <span>4</span>
                                <span id="member-4" style="color: #334155; font-weight: 600;">-</span>
                            </div>
                        </div>
                    </section>
                </div>
            </article>

            <!-- Actions -->
            <div class="actions">
                <button type="button" onclick="window.history.back()" style="all: unset; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 180px; height: 48px; border-radius: 999px; font-weight: 700; font-size: 15px;">Back</button>
                <button id="confirm-btn" type="submit" style="all: unset; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 180px; height: 48px; background: #ff8c00; border-radius: 999px; color: white; font-weight: 700; font-size: 15px;">Confirm</button>
            </div>
        </main>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const teamDataStr = sessionStorage.getItem('pendingTeamData');
            if (teamDataStr) {
                const teamData = JSON.parse(teamDataStr);
                
                // Fetch tournament details
                if (teamData.tournament_id) {
                    try {
                        const res = await fetch(`${API_BASE_URL}/tournaments/${teamData.tournament_id}`);
                        const tourney = await res.json();
                        document.getElementById('tourney-name').textContent = tourney.tournament_name;
                        document.getElementById('tourney-banner').src = tourney.tournament_banner || 'https://placehold.co/1200x400/0f172a/white?text=KMITL+Tournament';
                        
                        if (tourney.start_date) {
                            const date = new Date(tourney.start_date).toLocaleDateString();
                            document.getElementById('summary-tournament-date').textContent = `Starts ${date}`;
                        }
                    } catch (e) { console.error(e); }
                }

                document.getElementById('confirm-team-name').textContent = teamData.team_name;
                document.getElementById('confirm-leader-name').textContent = teamData.leader_name;
                const fallbackTeamLogo = '../../../icons/users.svg';
                const teamLogoImg = document.getElementById('team-logo-preview');
                teamLogoImg.src = teamData.team_banner_url || fallbackTeamLogo;
                teamLogoImg.onerror = () => teamLogoImg.src = fallbackTeamLogo;
                
                if (teamData.leader_name) {
                    const initials = teamData.leader_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    document.getElementById('leader-initials-bg').textContent = initials;
                }
                
                document.getElementById('member-1').textContent = teamData.member_1 || '-';
                document.getElementById('member-2').textContent = teamData.member_2 || '-';
                document.getElementById('member-3').textContent = teamData.member_3 || '-';
                document.getElementById('member-4').textContent = teamData.member_4 || '-';
            }
        });

        document.getElementById('confirm-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = e.currentTarget;
            if (btn.disabled) return;
            
            btn.disabled = true;
            btn.textContent = 'Registering...';

            const teamDataStr = sessionStorage.getItem('pendingTeamData');
            if (!teamDataStr) {
                alert('No team data found.'); 
                btn.disabled = false;
                btn.textContent = 'Confirm';
                return;
            }
            const teamData = JSON.parse(teamDataStr);
            
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                alert('You must be logged in to create a team');
                window.location.href = '../../Login Page/login.html';
                return;
            }
            const user = JSON.parse(userStr);
            teamData.created_by = user.user_id;

            try {
                // 1. Create Team (strip tournament_id — it belongs in Application, not Team)
                const { tournament_id, ...teamOnly } = teamData;
                const teamRes = await fetch(`${API_BASE_URL}/teams`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(teamOnly)
                });

                if (teamRes.ok) {
                    const newTeam = await teamRes.json();

                    // 2. Register for Tournament
                    const appRes = await fetch(`${API_BASE_URL}/applications`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            team_id: newTeam.team_id,
                            tournament_id: tournament_id
                        })
                    });

                    if (appRes.ok) {
                        alert('Team created and registered successfully!');
                        sessionStorage.removeItem('pendingTeamData');
                        window.location.href = '../Team(Have) Page 6/HistoryTeam_6.html';
                    } else {
                        const appErr = await appRes.json();
                        alert('Team created, but registration failed: ' + (appErr.error || 'Unknown error'));
                        window.location.href = '../Team(Have) Page 6/HistoryTeam_6.html';
                    }
                } else {
                    const teamErr = await teamRes.json();
                    alert('Team creation failed: ' + (teamErr.error || teamErr.message || 'Unknown error'));
                    btn.disabled = false;
                    btn.textContent = 'Confirm';
                }
            } catch(err) {
                console.error(err);
                alert('Error connecting to server.');
                btn.disabled = false;
                btn.textContent = 'Confirm';
            }
        });
    </script>
</body>
</html>
