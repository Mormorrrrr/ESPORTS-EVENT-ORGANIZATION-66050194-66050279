<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - My History Team</title>
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
    <style>
        /* Specific tweaks for Team cards if needed */
        .team-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }
        .team-meta img {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../../User/Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Viewer/Tournament Page 17/tournament_17.html";}}
            </script>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../../User/Tournament List Page 1/userlogin_1.html">
                    <img src="../../../icons/trophy-star.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="HistoryTeam_6.html">
                    <img src="../../../icons/users.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#">
                    <img src="../../../icons/info.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#">
                    <img src="../../../icons/settings.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="tournaments-list-wrapper standardized-main-content">
            <section class="tournaments-list">
                <div class="container-2">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <img src="../../../icons/users.svg" alt="" style="width: 28px; height: 28px;" />
                        <h2 class="my-history-team" style="margin: 0; font-size: 24px;">My Teams</h2>
                    </div>
                    <button class="button" type="button" onclick="window.location.href='../CreateTeamStep1 Page 4/createteamStep1_4.html'">
                        <span class="text">Create Team</span>
                    </button>
                </div>
                
                <div id="teams-container" class="tournament-card-wrapper">
                    <!-- Teams will be loaded here -->
                    <div style="color: #64748b; padding: 40px; text-align: center; width: 100%;">Loading your teams...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('teams-container');
            const userStr = localStorage.getItem('user');
            
            if (!userStr) {
                container.innerHTML = '<div style="color: #64748b; padding: 40px; text-align: center; width: 100%;">Please login to view your teams.</div>';
                return;
            }

            const user = JSON.parse(userStr);
            if ((user.role || '').toLowerCase() === 'admin') {
                window.location.href = '../../Admin/TeamList Page 12/TeamList_12.html';
                return;
            }
            const fallbackTeamBanner = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200';

            try {
                const res = await fetch(`${API_BASE_URL}/teams`);
                if (!res.ok) throw new Error('Failed to fetch');
                const allTeams = await res.json();
                
                // Filter teams by creator
                const myTeams = allTeams.filter(t => t.created_by === user.user_id);
                
                if (myTeams.length === 0) {
                    window.location.href = '../Team(noHave) Page 3/Teamnohave_3.html';
                    return;
                }

                container.innerHTML = '';
                myTeams.forEach(team => {
                    const card = document.createElement('div');
                    card.className = 'tournament-card';
                    
                    const bannerUrl = team.team_banner_url || fallbackTeamBanner;
                    
                    card.innerHTML = `
                        <div class="banner-container">
                            <img class="tournament-banner-img" src="${bannerUrl}" alt="${team.team_name}" 
                                 onerror="this.src='${fallbackTeamBanner}'">
                        </div>
                        <div class="card-content">
                            <h3 class="tournament-title-row" title="${team.team_name}">${team.team_name}</h3>
                            <div class="team-meta">
                                <img src="../../../icons/user.svg" alt="">
                                <span>Leader: ${team.leader_name}</span>
                            </div>
                            <div class="card-footer" style="margin-top: 12px;">
                                <button class="view-btn" onclick="window.location.href='../EditTeam Page 7/editTeam.html?id=${team.team_id}'">
                                    <img src="../../../icons/pencil.svg" alt="" style="width:14px; height:14px; margin-right:8px; filter: grayscale(1) opacity(0.7);">
                                    Edit Team
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div style="color: #ef4444; padding: 40px; text-align: center; width: 100%;">Failed to load teams. Please try again.</div>';
            }
        });
    </script>
</body>

</html>

</html>
