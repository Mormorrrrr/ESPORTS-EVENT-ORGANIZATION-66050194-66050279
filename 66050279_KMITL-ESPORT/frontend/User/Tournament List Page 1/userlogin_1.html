<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT</title>
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/globals9.css" />
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/styleguide9.css" />
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/style9.css?v=3" />
    <link rel="stylesheet" href="./style1.css?v=3" />
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Login Page/login.html";}}
            </script>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="frame" role="main">
            <!-- Loading Status Indicator -->
            <div id="status-debug" style="padding: 10px;  font-size: 12px; color: #94a3b8; border-bottom: 1px solid #f1f5f9; display: none;">
                Starting data fetch...
            </div>

            <!-- Tournament Section -->
            <section class="section-margin" aria-labelledby="tournament-heading">
                <div class="section-header">
                    <div class="header-left">
                        <h1 class="text-wrapper-3" id="tournament-heading" style="display: block; opacity: 1; visibility: visible;">Tournament</h1>
                        <p class="p">Join the fight and prove your skills in the latest KMITL events.</p>
                    </div>
                    <a href="#" class="view-all-link">
                        <span>View All</span>
                        <img src="../../../icons/arrow-right.svg" style="width: 14px; height: 14px; filter: invert(56%) sepia(87%) saturate(1915%) hue-rotate(1deg) brightness(104%) contrast(106%);" />
                    </a>
                </div>
                
                <div class="container-8" id="tournament-list-container">
                    <p style="padding: 40px; text-align: center; color: #64748b; font-size: 18px;">
                        Loading tournaments...
                    </p>
                </div>
            </section>

            <!-- Upcoming Matches Section -->
            <section class="section-2" id="upcoming-matches-section" aria-labelledby="upcoming-matches-heading" style="display: none;">
                <div class="section-header">
                    <div class="header-left">
                        <div class="header-title-wrap">
                            <img src="../../../icons/high-five-celebration-yes.svg" style="width: 28px; height: 28px;" alt="" />
                            <h2 class="text-wrapper-9" id="upcoming-matches-heading">Upcoming Matches</h2>
                        </div>
                    </div>
                    <a href="../MatchViewAll2 Page 21/matchviewall2_21.html" class="view-all-link">
                        <span>View All</span>
                        <img src="../../../icons/arrow-right.svg" style="width: 14px; height: 14px; filter: invert(56%) sepia(87%) saturate(1915%) hue-rotate(1deg) brightness(104%) contrast(106%);" />
                    </a>
                </div>
                <div class="container-16" id="match-list-container">
                    <!-- Dynamic matches -->
                </div>
            </section>
        </main>


    </div>

    <script src="../../api-config.js"></script>
    <script>
        (function() {
            const listContainer = document.getElementById('tournament-list-container');
            const matchSection = document.getElementById('upcoming-matches-section');
            const matchListContainer = document.getElementById('match-list-container');
            const debugEl = document.getElementById('status-debug');

            async function loadData() {
                try {
                    const baseUrl = API_BASE_URL;
                    
                    const res = await fetch(`${baseUrl}/tournaments`);
                    if (!res.ok) throw new Error('Server responded with ' + res.status);
                    
                    const tournaments = await res.json();
                    
                    listContainer.innerHTML = '';
                    if (!tournaments || tournaments.length === 0) {
                        listContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: #64748b;">No tournaments available in the database.</p>';
                    } else {
                        for (const t of tournaments) {
                            const article = document.createElement('article');
                            article.className = 'background-shadow';
                            const bannerSrc = t.tournament_banner || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800'; // High-quality rectangular gaming banner fallback

                            // Fetch actual approved team count for this tournament
                            let teamCount = 0;
                            try {
                                const appRes = await fetch(`${baseUrl}/applications?tournament_id=${t.tournament_id}`);
                                if (appRes.ok) {
                                    const apps = await appRes.json();
                                    teamCount = apps.filter(a => a.status && a.status.toUpperCase() === 'APPROVED').length;
                                }
                            } catch (e) {
                                console.warn('Could not fetch team count for tournament', t.tournament_id);
                            }

                            article.innerHTML = `
                                <div class="container-9">
                                    <img src="${bannerSrc}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800'" style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <div class="container-10">
                                    <h2 class="text-wrapper-5">${t.tournament_name}</h2>
                                    <p class="major-tournament">${(t.tournament_type || '').split(' • ')[0]}</p>
                                    <div class="container-11">
                                        <div class="container-12">
                                            <img src="../../../icons/calendar-clock.svg" style="width: 16px; height: 16px;" />
                                            <span>2h remaining</span>
                                        </div>
                                        <div class="container-12">
                                            <img src="../../../icons/users.svg" style="width: 16px; height: 16px;" />
                                            <span>${teamCount} Teams</span>
                                        </div>
                                    </div>
                                    <button class="button-3" type="button" onclick="window.location.href='../Tournament Detail Page 2/Usertournament_2.html?id=${t.tournament_id}'">
                                        View
                                    </button>
                                </div>
                            `;
                            listContainer.appendChild(article);
                        }
                    }

                    // Matches rendering (Upgraded to match mockup)
                    let foundMatches = false;
                    matchListContainer.innerHTML = ''; // Clear before starting
                    
                    for (const t of tournaments) {
                        try {
                            const mRes = await fetch(`${baseUrl}/tournaments/${t.tournament_id}/matches`);
                            if (mRes.ok) {
                                const matches = await mRes.json();
                                // Only show matches that aren't finished yet
                                const upcoming = matches.filter(m => m.score1 === null && m.score2 === null);
                                if (upcoming.length > 0) {
                                    foundMatches = true;
                                    upcoming.slice(0, 3).forEach(m => {
                                        const row = document.createElement('article');
                                        row.className = 'background-border';
                                        row.innerHTML = `
                                            <div class="match-info-left">
                                                <span class="match-label">START IN</span>
                                                <span class="match-time">15:30</span>
                                            </div>
                                            <div class="match-teams-center">
                                                <div class="team-item" style="justify-content: flex-end;">
                                                    <span class="team-name">${m.team1_name || 'TBD'}</span>
                                                    <div class="team-icon">
                                                        <img src="../../../icons/user.svg" style="width: 16px; height: 16px; opacity: 0.5;" />
                                                    </div>
                                                </div>
                                                <div class="vs-badge-circle">VS</div>
                                                <div class="team-item">
                                                    <div class="team-icon">
                                                        <img src="../../../icons/user.svg" style="width: 16px; height: 16px; opacity: 0.5;" />
                                                    </div>
                                                    <span class="team-name">${m.team2_name || 'TBD'}</span>
                                                </div>
                                            </div>
                                        `;
                                        matchListContainer.appendChild(row);
                                    });
                                }
                            }
                        } catch (e) {
                            console.warn('Failed to fetch matches for tournament', t.tournament_id);
                        }
                    }
                    
                    // Final visibility toggle
                    matchSection.style.display = foundMatches ? 'flex' : 'none';
                } catch (error) {
                    console.error('Load Failed:', error);
                    listContainer.innerHTML = `<p style="padding: 40px; text-align: center; color: #ef4444;">Failed to connect to data source.</p>`;
                }
            }
            loadData();
        })();
    </script>
</body>

</html>
