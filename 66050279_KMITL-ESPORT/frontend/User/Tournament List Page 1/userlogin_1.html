<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT</title>
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/globals9.css" />
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/styleguide9.css" />
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/style9.css" />
    <link rel="stylesheet" href="./style1.css" />
    <link rel="stylesheet" href="../../shared-admin.css" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="frame" role="main">
            <!-- Loading Status Indicator -->
            <div id="status-debug" style="padding: 10px;  font-size: 12px; color: #94a3b8; border-bottom: 1px solid #f1f5f9; display: none;">
                Starting data fetch...
            </div>

            <!-- Tournament Section -->
            <section class="section-margin" aria-labelledby="tournament-heading">
                <div class="section-header">
                    <div class="header-left">
                        <div class="header-title-wrap">
                            <img src="../../../icons/gamepad.svg" style="width: 32px; height: 32px;" alt="" />
                            <h1 class="text-wrapper-3" id="tournament-heading">Tournament</h1>
                        </div>
                        <p class="p">Join the fight and prove your skills in the latest KMITL events.</p>
                    </div>
                </div>
                
                <div class="container-8" id="tournament-list-container">
                    <p style="padding: 40px; text-align: center; color: #64748b; font-size: 18px;">
                        Loading tournaments...
                    </p>
                </div>
            </section>

            <!-- Upcoming Matches Section -->
            <section class="section-2" id="upcoming-matches-section" aria-labelledby="upcoming-matches-heading" style="display: none;">
                <div class="section-header">
                    <div class="header-title-wrap">
                        <img src="../../../icons/high-five-celebration-yes.svg" style="width: 24px; height: 24px;" alt="" />
                        <h2 class="text-wrapper-9" id="upcoming-matches-heading">Upcoming Matches</h2>
                    </div>
                </div>
                <div class="container-16" id="match-list-container">
                    <!-- Dynamic matches -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <span>© 2026 KMITL ESPORT</span>
            <div class="footer-links">
                <a href="#">Documentation</a>
                <a href="#">API Reference</a>
                <a href="#">Support</a>
            </div>
        </footer>
    </div>

    <script>
        (function() {
            const listContainer = document.getElementById('tournament-list-container');
            const matchSection = document.getElementById('upcoming-matches-section');
            const matchListContainer = document.getElementById('match-list-container');
            const debugEl = document.getElementById('status-debug');

            function log(msg, isError = false) {
                console.log(msg);
                if (debugEl) {
                    debugEl.style.display = 'block';
                    debugEl.innerHTML = (isError ? '🔴 ' : '🟢 ') + msg;
                    if (isError) debugEl.style.color = '#ef4444';
                }
            }

            async function loadData() {
                try {
                    // Try fetch to both 127.0.0.1 and localhost
                    const baseUrl = 'http://127.0.0.1:3000';
                    log('Connecting to ' + baseUrl + '/tournaments...');
                    
                    const res = await fetch(`${baseUrl}/tournaments`);
                    if (!res.ok) throw new Error('Server responded with ' + res.status);
                    
                    const tournaments = await res.json();
                    log('Successfully loaded ' + tournaments.length + ' tournaments.');
                    
                    listContainer.innerHTML = '';
                    if (!tournaments || tournaments.length === 0) {
                        listContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: #64748b;">No tournaments available in the database.</p>';
                    } else {
                        tournaments.forEach(t => {
                            const article = document.createElement('article');
                            article.className = 'background-shadow';
                            const startDate = new Date(t.start_date).toLocaleDateString();
                            const bannerSrc = t.tournament_banner || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800';

                            article.innerHTML = `
                                <div class="container-9">
                                    <img src="${bannerSrc}" style="width: 100%; height: 100%; object-fit: cover;">
                                    <div class="gradient"></div>
                                </div>
                                <div class="container-10">
                                    <h2 class="text-wrapper-5">${t.tournament_name}</h2>
                                    <p class="major-tournament">${t.tournament_type} • ${t.format || 'Standard'}</p>
                                    <div class="container-11">
                                        <div class="container-12">
                                            <img src="../../../icons/calendar-clock.svg" style="width: 14px; height: 14px;" />
                                            <span>${startDate}</span>
                                        </div>
                                        <div class="container-12">
                                            <img src="../../../icons/users.svg" style="width: 14px; height: 14px;" />
                                            <span>32 Teams</span>
                                        </div>
                                    </div>
                                    <button class="button-3" type="button" onclick="window.location.href='../Tournament Detail Page 2/Usertournament_2.html?id=${t.tournament_id}'">
                                        <span>View</span>
                                    </button>
                                </div>
                            `;
                            listContainer.appendChild(article);
                        });
                    }

                    // Matches
                    for (const t of tournaments) {
                        try {
                            const mRes = await fetch(`${baseUrl}/tournaments/${t.tournament_id}/matches`);
                            if (mRes.ok) {
                                const matches = await mRes.json();
                                if (Array.isArray(matches) && matches.length > 0) {
                                    matchSection.style.display = 'flex';
                                    matchListContainer.innerHTML = '';
                                    matches.slice(0, 3).forEach(m => {
                                        const row = document.createElement('article');
                                        row.className = 'background-border';
                                        row.innerHTML = `
                                            <div class="match-info-left">
                                                <span class="match-label">MATCH</span>
                                                <span class="match-time">R${m.round || 1} - P${m.position || 0}</span>
                                            </div>
                                            <div class="match-teams-center">
                                                <span class="team-name">${m.team1_name || 'TBD'}</span>
                                                <span class="vs-badge">VS</span>
                                                <span class="team-name">${m.team2_name || 'TBD'}</span>
                                            </div>
                                        `;
                                        matchListContainer.appendChild(row);
                                    });
                                }
                            }
                        } catch (e) {}
                    }
                } catch (error) {
                    log('Load Failed: ' + error.message, true);
                    listContainer.innerHTML = `
                        <div style="padding: 40px; text-align: center;">
                            <p style="color: #ef4444; font-size: 18px; margin-bottom: 20px;">Unable to connect to the database.</p>
                            <p style="color: #64748b; font-size: 14px;">Please ensure your backend server (server.js) is running on port 3000.</p>
                            <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer;">Retry Connection</button>
                        </div>
                    `;
                }
            }
            loadData();
        })();
    </script>
</body>
</html>
