<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - User Match View</title>
    <link rel="stylesheet" href="globals21.css" />
    
    
    
    
    <style>
        body, .admin-tournament, .sidebar-text, .ns-title-text, .ns-nav-link {
            
            -webkit-font-smoothing: antialiased;
        }
    </style>

    
    



    
        <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
                                                        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../../User/Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
            </div>
            <script>
            (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
            function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Login Page/login.html";}}
            </script>
            </div>
        </header>
                                                        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../../User/Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../../User/Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="frame" aria-label="Upcoming Matches">
            <div class="heading">
                <div class="icon-wrapper">
                    <img class="icon-5" src="../../../icons/gamepad.svg" alt="" aria-hidden="true" style="width: 24px; height: 24px;" />
                </div>
                <h1 class="text-wrapper-2">Upcoming Matches</h1>
            </div>
            <div class="container-6">
                <!-- Match 1: Team Omega vs KMITL Knights -->
                <article class="background-border" aria-label="Match: Team Omega vs KMITL Knights">
                    <div class="container-7">
                        <div class="container-8">
                            <div class="div-2"><span class="text-8">START IN</span></div>
                            <div class="div-2"><time class="text-9">15:30</time></div>
                        </div>
                        <div class="container-9">
                            <div class="div">
                                <div class="div-2"><span class="text-10">Team Omega</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-3">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-wrapper-4">KMITL Knights</span></div>
                            </div>
                        </div>
                    </div>
                </article>
                <!-- Match 2: Steel Rebels vs Shadow Step -->
                <article class="container-wrapper" aria-label="Match: Steel Rebels vs Shadow Step">
                    <div class="container-10">
                        <div class="container-11">
                            <div class="div-2"><span class="text-11">DEC 12</span></div>
                            <div class="div-2"><time class="text-12">20:00</time></div>
                        </div>
                        <div class="container-12">
                            <div class="div">
                                <div class="div-2"><span class="text-13">Steel Rebels</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-3">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-14">Shadow Step</span></div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>

    </div>
</body>

</html>
