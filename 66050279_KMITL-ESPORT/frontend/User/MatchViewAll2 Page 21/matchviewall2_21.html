<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Upcoming Matches</title>
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                    <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                    <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
                </div>
                <script>
                (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
                function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Viewer/Tournament Page 17/tournament_17.html";}}
                </script>
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="frame" aria-label="Upcoming Matches">
            <div style="margin-bottom: 24px;">
                <h1 style="font-size:24px;font-weight:700;color:#0f172a;margin:0 0 4px;">Upcoming Matches</h1>
                <p style="font-size:14px;color:#64748b;margin:0;">Scheduled matches across all tournaments.</p>
            </div>
            <div id="match-list-container" style="display:flex;flex-direction:column;gap:16px;width:100%;">
                <p style="padding:40px;text-align:center;color:#64748b;">Loading matches...</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        (function () {
            const container = document.getElementById('match-list-container');
            async function loadMatches() {
                try {
                    const res = await fetch(`${API_BASE_URL}/matches`);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const matches = await res.json();
                    container.innerHTML = '';
                    if (!matches || matches.length === 0) {
                        container.innerHTML = '<p style="padding:40px;text-align:center;color:#64748b;font-size:16px;">ยังไม่มีการแข่งขันที่กำหนดไว้</p>';
                        return;
                    }
                    matches.forEach(m => {
                        const card = document.createElement('div');
                        card.style.cssText = 'display:flex;align-items:center;gap:20px;padding:20px 24px;background:#fff;border-radius:16px;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%;box-sizing:border-box;';
                        const tourName = m.Tournament ? m.Tournament.tournament_name : 'Tournament';
                        card.innerHTML = `
                            <div style="flex:1;min-width:0;">
                                <span style="font-size:11px;font-weight:700;color:#ff8c00;letter-spacing:0.5px;text-transform:uppercase;">${tourName}</span>
                                <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-top:12px;">
                                    <span style="font-size:16px;font-weight:700;color:#0f172a;flex:1;text-align:right;">${m.team1_name||'TBD'}</span>
                                    <span style="font-size:18px;font-weight:800;color:#94a3b8;padding:6px 16px;background:#f8fafc;border-radius:8px;">VS</span>
                                    <span style="font-size:16px;font-weight:700;color:#0f172a;flex:1;text-align:left;">${m.team2_name||'TBD'}</span>
                                </div>
                                <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;">
                                    <span style="font-size:12px;color:#64748b;">Round ${m.round||'-'}</span>
                                    ${m.match_date?`<span style="font-size:12px;color:#64748b;">${new Date(m.match_date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</span>`:''}
                                    <span style="font-size:11px;font-weight:600;padding:2px 10px;border-radius:99px;background:${m.status==='completed'?'#dcfce7':m.status==='ongoing'?'#fef9c3':'#f1f5f9'};color:${m.status==='completed'?'#15803d':m.status==='ongoing'?'#92400e':'#64748b'};">${(m.status||'Scheduled').toUpperCase()}</span>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } catch (err) {
                    container.innerHTML = `<p style="padding:40px;text-align:center;color:#ef4444;">Failed to load: ${err.message}</p>`;
                }
            }
            loadMatches();
        })();
    </script>
</body>

</html>
