<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Tournaments</title>
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="admin-tournament">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <div class="ns-user-area" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="logoutUser()" title="ออกจากระบบ">
                    <span id="header-username" style="font-size:13px;font-weight:600;color:#334155;"></span>
                    <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" style="cursor:pointer;" />
                </div>
                <script>
                (function(){var u=JSON.parse(localStorage.getItem("user")||"null");if(u&&u.username)document.getElementById("header-username").textContent=u.username;})();
                function logoutUser(){if(confirm("ต้องการออกจากระบบ?")){localStorage.removeItem("user");window.location.href="../../Viewer/Tournament Page 17/tournament_17.html";}}
                </script>
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="frame" aria-label="Tournaments List">
            <div style="margin-bottom: 24px;">
                <h1 style="font-size:24px;font-weight:700;color:#0f172a;margin:0 0 4px;">Tournaments List</h1>
                <p style="font-size:14px;color:#64748b;margin:0;">All tournaments hosted by KMITL ESPORT.</p>
            </div>
            <div id="tournament-list-container" style="display:flex;flex-direction:column;gap:16px;width:100%;">
                <p style="padding:40px;text-align:center;color:#64748b;font-size:18px;">Loading tournaments...</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        (function () {
            const listContainer = document.getElementById('tournament-list-container');
            async function loadTournaments() {
                try {
                    const res = await fetch(`${API_BASE_URL}/tournaments`);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const tournaments = await res.json();
                    listContainer.innerHTML = '';
                    if (!tournaments || tournaments.length === 0) {
                        listContainer.innerHTML = '<p style="padding:40px;text-align:center;color:#64748b;">No tournaments available.</p>';
                        return;
                    }
                    const fallback = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800';
                    tournaments.forEach(t => {
                        const article = document.createElement('article');
                        const bannerSrc = t.tournament_banner || fallback;
                        article.style.cssText = 'display:flex;align-items:center;gap:20px;padding:16px 20px;background:#fff;border-radius:16px;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%;box-sizing:border-box;';
                        article.innerHTML = `
                            <div style="width:140px;height:90px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#1e293b;">
                                <img src="${bannerSrc}" onerror="this.src='${fallback}'" style="width:100%;height:100%;object-fit:cover;">
                            </div>
                            <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;">
                                <h2 style="font-size:17px;font-weight:700;color:#0f172a;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.tournament_name}</h2>
                                <p style="font-size:13px;color:#64748b;margin:0;">${(t.tournament_type||'').split(' • ')[0]||'Tournament'}</p>
                                <div style="display:flex;align-items:center;gap:16px;margin-top:4px;">
                                    <div style="display:flex;align-items:center;gap:5px;font-size:13px;color:#64748b;">
                                        <img src="../../../icons/calendar-clock.svg" style="width:14px;height:14px;opacity:0.7;" />
                                        <span>${t.start_date ? new Date(t.start_date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : 'TBD'}</span>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:5px;font-size:13px;color:#64748b;">
                                        <img src="../../../icons/users.svg" style="width:14px;height:14px;opacity:0.7;" />
                                        <span>${t._count?.applications||0} Teams</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        listContainer.appendChild(article);
                    });
                } catch (err) {
                    listContainer.innerHTML = `<p style="padding:40px;text-align:center;color:#ef4444;">Failed to load: ${err.message}</p>`;
                }
            }
            loadTournaments();
        })();
    </script>
</body>

</html>
