<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL Esport - Tournament</title>
    <link rel="stylesheet" href="globals2.css" />
    
        <link rel="stylesheet" href="../../shared-admin.css" />
</head>

<body>
    <div class="admin-tournament">
                                                        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../../User/Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
            </div>
        </header>
                                                        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../../User/Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../../User/Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content Wrapper -->
        <main class="frame" style="padding-bottom: 80px;">
            <!-- Hero Section -->
            <section class="tournament-hero" style="position: relative; width: 100%; height: 320px; border-radius: 24px; overflow: hidden; margin-bottom: 40px; background: #0f172a;">
                <img class="image-2" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200" alt="Tournament banner" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;" />
                <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15, 23, 42, 0) 0%, rgba(15, 23, 42, 0.8) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;">
                    <h1 id="tournament-display-name" style="color: white; font-size: 48px; font-weight: 800; margin: 0 0 16px 0; letter-spacing: -1px;">Tournament Details</h1>
                    <button class="join-button" onclick="window.location.href='../Team(noHave) Page 3/Teamnohave_3.html'" style="width: fit-content; padding: 14px 40px; background: #ff8c00; color: white; border: none; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 16px; box-shadow: 0 10px 15px -3px rgba(255, 140, 0, 0.3); transition: all 0.2s;">JOIN TOURNAMENT</button>
                </div>
            </section>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 32px; align-items: start;">
                <!-- Left Column: Details -->
                <div style="display: flex; flex-direction: column; gap: 32px;">
                    <!-- Tournament Details Card -->
                    <section class="section" style="background: white; padding: 32px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                        <div class="heading" style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                            <img src="../../../icons/info.svg" alt="" style="width: 24px; height: 24px;" />
                            <h2 style="margin: 0; font-size: 20px; font-weight: 700; color: #0f172a;">Tournament Information</h2>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                            <div style="display: flex; gap: 16px;">
                                <div style="width: 48px; height: 48px; background: #ff8c001a; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img src="../../../icons/gamepad.svg" style="width: 24px; height: 24px;" />
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Type</div>
                                    <div id="detail-type" style="font-size: 16px; font-weight: 600; color: #0f172a;">5v5 Squads</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 16px;">
                                <div style="width: 48px; height: 48px; background: #ff8c001a; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img src="../../../icons/daily-calendar.svg" style="width: 24px; height: 24px;" />
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Duration</div>
                                    <div id="detail-duration" style="font-size: 16px; font-weight: 600; color: #0f172a;">10 Days</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 16px;">
                                <div style="width: 48px; height: 48px; background: #ff8c001a; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img src="../../../icons/age-alt.svg" style="width: 24px; height: 24px;" />
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Age Range</div>
                                    <div id="detail-age" style="font-size: 16px; font-weight: 600; color: #0f172a;">15 - 25 Years</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 16px;">
                                <div style="width: 48px; height: 48px; background: #ff8c001a; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img src="../../../icons/trophy-star.svg" style="width: 24px; height: 24px;" />
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Format</div>
                                    <div id="detail-format" style="font-size: 16px; font-weight: 600; color: #0f172a;">Single Elimination</div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                
                <!-- Right Column: Dates -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../../User/Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../../User/Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
            </div>

            <!-- Bracket Section -->
            <section style="margin-top: 48px;">
                <div class="heading-2" style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                    <img src="../../../icons/trophy-star.svg" alt="" style="width: 28px; height: 28px;" />
                    <h2 style="margin: 0; font-size: 24px; font-weight: 800; color: #0f172a;">Tournament Bracket</h2>
                </div>
                <div id="match-list-container" style="display: flex; flex-direction: column; gap: 16px;">
                    <!-- Dynamically populated matches -->
                    <div style="text-align: center; padding: 40px; color: #64748b;">
                        Loading bracket data...
                    </div>
                </div>
            </section>
        </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            const matchListContainer = document.getElementById('match-list-container');

            try {
                // Fetch Tournament Detail
                const res = await fetch(`http://localhost:3000/tournaments/${id}`);
                const tournament = await res.json();

                // Bind Data
                document.getElementById('tournament-display-name').textContent = tournament.tournament_name;
                document.getElementById('detail-type').textContent = tournament.tournament_type || 'N/A';
                document.getElementById('detail-duration').textContent = tournament.duration || 'N/A';
                document.getElementById('detail-age').textContent = `${tournament.age_min || 0} - ${tournament.age_max || 100} years old`;
                document.getElementById('detail-format').textContent = tournament.tournament_type || 'N/A';
                // document.getElementById('open-date').textContent = new Date(tournament.start_date).toLocaleDateString();
                // document.getElementById('close-date').textContent = new Date(tournament.end_date).toLocaleDateString();

                // Banner Fallback
                const bannerImg = document.querySelector('.image-2');
                const fallbackBanner = 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200';
                if (tournament.tournament_banner) {
                    bannerImg.src = tournament.tournament_banner;
                    bannerImg.onerror = () => bannerImg.src = fallbackBanner;
                } else {
                    bannerImg.src = fallbackBanner;
                }

                // Fetch Matches
                const matchesRes = await fetch(`http://localhost:3000/tournaments/${id}/matches`);
                const matches = await matchesRes.json();

                if (!matches || matches.length === 0) {
                    matchListContainer.innerHTML = `
                        <div style="text-align: center; padding: 40px; background: white; border-radius: 16px; border: 1px dashed #cbd5e1; color: #64748b;">
                            <img src="../../../icons/info.svg" style="width: 32px; height: 32px; margin-bottom: 12px; opacity: 0.5;" />
                            <p style="font-weight: 500;">No matches scheduled yet.</p>
                        </div>`;
                    return;
                }

                // Render Matches
                matchListContainer.innerHTML = matches.map(m => {
                    const score1 = m.score1 ?? 0;
                    const score2 = m.score2 ?? 0;
                    const isFinished = m.score1 !== null && m.score2 !== null;
                    const team1Win = isFinished && score1 > score2;
                    const team2Win = isFinished && score2 > score1;

                    return `
                        <article style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: white; border-radius: 16px; border: 1px solid #f1f5f9; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: default;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 6px -1px rgba(0,0,0,0.1)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                            <div style="display: flex; align-items: center; gap: 24px; flex: 1;">
                                <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <span style="font-weight: ${team1Win ? '800' : '500'}; color: ${team1Win ? '#0f172a' : '#64748b'}; transition: all 0.2s;">${m.team1_name || 'TBD'}</span>
                                        <span style="font-weight: 800; color: ${team1Win ? '#ff8c00' : '#94a3b8'}; font-size: 20px; transition: all 0.2s;">${score1}</span>
                                    </div>
                                    <div style="height: 1px; background: #f1f5f9; width: 100%;"></div>
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <span style="font-weight: ${team2Win ? '800' : '500'}; color: ${team2Win ? '#0f172a' : '#64748b'}; transition: all 0.2s;">${m.team2_name || 'TBD'}</span>
                                        <span style="font-weight: 800; color: ${team2Win ? '#ff8c00' : '#94a3b8'}; font-size: 20px; transition: all 0.2s;">${score2}</span>
                                    </div>
                                </div>
                            </div>
                            <div style="margin-left: 40px; text-align: right; min-width: 80px;">
                                ${isFinished ? 
                                    `<span style="font-size: 11px; font-weight: 700; color: #10b981; background: #dcfce7; padding: 4px 12px; border-radius: 12px; text-transform: uppercase;">Finished</span>` : 
                                    `<span style="font-size: 11px; font-weight: 700; color: #64748b; background: #f1f5f9; padding: 4px 12px; border-radius: 12px; text-transform: uppercase;">Upcoming</span>`
                                }
                            </div>
                        </article>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error fetching tournament detail:', error);
                matchListContainer.innerHTML = `<div style="color: #ef4444; padding: 20px; text-align: center;">Failed to load bracket data. Please try again later.</div>`;
            }
        });
    </script>
    </div>
</body>

</html>
