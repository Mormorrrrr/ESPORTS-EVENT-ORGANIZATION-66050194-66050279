<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Create Team</title>
    <!-- Reusing Admin Styles for "Gold Standard" Parity -->
    <link rel="stylesheet" href="../../Admin/CreateTournament Page 11/globals11.css" />
    <link rel="stylesheet" href="../../Admin/CreateTournament Page 11/style11.css" />
    <link rel="stylesheet" href="../../shared-admin.css" />
    <style>
        /* Custom tweaks for Team creation vs Tournament creation */
        .form-section {
            height: auto !important;
            padding-bottom: 40px;
        }
        .progress-stepper {
            margin-left: 411px;
            width: 896px;
            margin-bottom: 24px;
            margin-top: 100px;
            background: white;
            padding: 24px 32px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>
    <div class="admin-create">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../../User/Tournament List Page 1/userlogin_1.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" />
                </label>
                <img class="ns-user-avatar" src="../../../icons/user.svg" alt="User profile" />
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link-2" href="../../User/Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link" href="../../User/Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Progress Stepper -->
        <section class="progress-stepper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span style="font-weight: 700; color: #0f172a;">Step 1 of 2</span>
                <span style="color: #64748b; font-size: 14px;">50% Complete</span>
            </div>
            <div style="height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; margin-bottom: 12px;">
                <div style="width: 50%; height: 100%; background: #ff8c00; border-radius: 4px;"></div>
            </div>
            <span style="color: #64748b; font-size: 13px;">Next: Team Roster Confirmation</span>
        </section>

        <!-- Main Form -->
        <main class="form-section" style="margin-top: 0;">
            <form id="create-team-form">
                <!-- Select Tournament -->
                <section class="basic-info" style="max-height: none; gap: 12px;">
                    <div class="div-2">
                        <label class="text-wrapper-4">Select Tournament</label>
                    </div>
                    <div class="input-2" style="background: white;">
                        <select id="tournament-select" style="width: 100%; border: none; background: transparent; outline: none; font-size: 16px; color: #0f172a; cursor: pointer;">
                            <option value="">Loading tournaments...</option>
                        </select>
                    </div>
                </section>

                <!-- Team Banner -->
                <section class="banner-upload" style="margin-top: 32px;">
                    <div class="div-2">
                        <span class="text-wrapper-4">Team Banner</span>
                    </div>
                    <div class="overlay-border" id="banner-dropzone">
                        <div id="upload-placeholder" style="display: contents;">
                            <img src="../../../icons/cloud-upload-alt.svg" style="width: 48px; height: 48px; margin-bottom: 16px;" />
                            <div class="container-8">
                                <div class="container-9">
                                    <p class="text-8">Click button to enter Image URL</p>
                                </div>
                                <div class="container-9">
                                    <p class="text-9">Recommended size: 1200x400px</p>
                                </div>
                            </div>
                            <button class="button" type="button" id="select-url-btn">
                                <span class="text-10">Select URL</span>
                            </button>
                        </div>

                        <div id="url-input-container" style="display: none; width: 80%; padding: 20px;">
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="banner-url-input" placeholder="https://example.com/banner.jpg" style="flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px;">
                                <button id="confirm-url-btn" type="button" style="padding: 0 20px; background: #ff8c00; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Add</button>
                            </div>
                        </div>

                        <div id="banner-preview-container" style="display: none; position: absolute; inset: 0;">
                            <img id="banner-preview-img" style="width: 100%; height: 100%; object-fit: cover; border-radius: 44px;">
                            <button id="remove-banner-btn" type="button" style="position: absolute; top: 20px; right: 20px; background: #ff8c00; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer;">Change</button>
                        </div>
                    </div>
                </section>

                <!-- Team Identity -->
                <section class="basic-info" style="margin-top: 32px; max-height: none;">
                    <div class="container-7">
                        <label class="text-wrapper-4">Team Name</label>
                        <div class="input-2">
                             <input type="text" id="team-name" class="text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="e.g. Neon Knights" />
                        </div>
                    </div>
                    <div class="container-7" style="margin-top: 16px;">
                        <label class="text-wrapper-4">Team Leader</label>
                        <div class="input-2">
                             <input type="text" id="leader-name" class="text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="Full name of leader" />
                        </div>
                    </div>
                </section>

                <!-- Team Roster -->
                <section class="basic-info" style="margin-top: 32px; max-height: none;">
                    <div class="div-2" style="margin-bottom: 16px;">
                        <span class="text-wrapper-4">TEAM MEMBERS (4)</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%;">
                        <div class="input-2"><input type="text" class="member-input text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="Member 1 Name" /></div>
                        <div class="input-2"><input type="text" class="member-input text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="Member 2 Name" /></div>
                        <div class="input-2"><input type="text" class="member-input text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="Member 3 Name" /></div>
                        <div class="input-2"><input type="text" class="member-input text-wrapper-5" style="width: 100%; border: none; background: transparent; outline: none;" placeholder="Member 4 Name" /></div>
                    </div>
                </section>

                <!-- Actions -->
                <div class="actions" style="margin-top: 48px; display: flex; gap: 16px; justify-content: flex-end; padding: 0 33px 33px; position: relative;">
                    <button type="button" onclick="window.history.back()" style="background: #f1f5f9; color: #64748b; border: none; padding: 14px 32px; border-radius: 999px; font-weight: 700; cursor: pointer; font-size: 16px;">Cancel</button>
                    <button id="btn-continue-step2" type="button" style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 240px; height: 56px; background: #ff8c00; border: none; border-radius: 999px; color: white; font-weight: 700; font-size: 16px; white-space: nowrap;">
                        Continue to Step 2
                    </button>
                </div>
            </form>
        </main>

        <!-- Footer -->
        <footer class="footer-footer">
            <div class="container-19">
                <span class="text-wrapper-7">© 2026 KMITL ESPORT</span>
            </div>
            <div style="display: flex; gap: 24px;">
                <a class="text-wrapper-8" href="#">Documentation</a>
                <a class="text-wrapper-9" href="#">API Reference</a>
                <a class="text-wrapper-10" href="#">Support</a>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.querySelector('form');
            const tournamentSelect = document.getElementById('tournament-select');
            
            // Fetch Tournaments
            try {
                const res = await fetch('http://localhost:3000/tournaments');
                const tournaments = await res.json();
                tournamentSelect.innerHTML = '<option value="">Choose an active event</option>' + 
                    tournaments.map(t => `<option value="${t.tournament_id}">${t.tournament_name}</option>`).join('');
            } catch (e) {
                console.error('Failed to fetch tournaments', e);
                tournamentSelect.innerHTML = '<option value="">Failed to load tournaments</option>';
            }

            // Banner Logic
            const selectUrlBtn = document.getElementById('select-url-btn');
            const urlInputContainer = document.getElementById('url-input-container');
            const uploadPlaceholder = document.getElementById('upload-placeholder');
            const bannerUrlInput = document.getElementById('banner-url-input');
            const confirmUrlBtn = document.getElementById('confirm-url-btn');
            const bannerPreviewContainer = document.getElementById('banner-preview-container');
            const bannerPreviewImg = document.getElementById('banner-preview-img');
            const removeBannerBtn = document.getElementById('remove-banner-btn');

            let currentBannerUrl = '';

            selectUrlBtn.addEventListener('click', () => {
                uploadPlaceholder.style.display = 'none';
                urlInputContainer.style.display = 'flex';
                bannerUrlInput.focus();
            });

            confirmUrlBtn.addEventListener('click', () => {
                const url = bannerUrlInput.value.trim();
                if (url) {
                    currentBannerUrl = url;
                    bannerPreviewImg.src = url;
                    urlInputContainer.style.display = 'none';
                    bannerPreviewContainer.style.display = 'block';
                }
            });

            removeBannerBtn.addEventListener('click', () => {
                currentBannerUrl = '';
                bannerPreviewContainer.style.display = 'none';
                uploadPlaceholder.style.display = 'contents';
                bannerUrlInput.value = '';
            });

            // Continue to Step 2 logic
            const continueBtn = document.getElementById('btn-continue-step2');
            continueBtn.addEventListener('click', () => {
                const tournamentId = tournamentSelect.value;
                const teamName = document.getElementById('team-name').value;
                const leaderName = document.getElementById('leader-name').value;
                const members = Array.from(document.querySelectorAll('.member-input')).map(input => input.value);

                if (!tournamentId || !teamName || !leaderName || members.some(m => !m)) {
                    alert('Please fill out all fields and select a tournament');
                    return;
                }

                const teamData = {
                    tournament_id: tournamentId,
                    team_name: teamName,
                    leader_name: leaderName,
                    team_banner: currentBannerUrl,
                    member_1: members[0],
                    member_2: members[1],
                    member_3: members[2],
                    member_4: members[3]
                };

                sessionStorage.setItem('pendingTeamData', JSON.stringify(teamData));
                window.location.href = '../CreateTeamStep2%20Page%205/createteamStep2_5.html';
            });
        });
    </script>
</body>

</html>
>
