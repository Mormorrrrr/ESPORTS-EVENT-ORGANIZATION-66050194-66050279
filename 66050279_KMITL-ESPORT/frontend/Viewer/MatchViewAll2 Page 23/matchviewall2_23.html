<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Viewer Match View</title>
    <link rel="stylesheet" href="globals23.css" />
    <link rel="stylesheet" href="styleguide23.css" />
    <link rel="stylesheet" href="style23.css" />
    <link rel="stylesheet" href="../../shared-admin.css" />
</head>

<body>
    <div class="viewer-match-view">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="img/Logo.png"
                    alt="KMITL ESPORT Logo" />
                <div class="div">
                    <div class="div-2">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div-2"><span class="text" onclick="window.location.href='../Tournament Page 17/tournament_17.html'">Home</span></div>
                    <div class="div-2"><span class="text-2">Explore</span></div>
                    <div class="div-2"><span class="text-3">News</span></div>
                </nav>
            </div>
            <div class="container-3">
                <label class="label" aria-label="Search tournaments">
                    <div class="container-4">
                        <div class="background">
                            <div class="div-2">
                                <img class="icon" src="img/icon.svg" alt="Search icon" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </label>
                <button class="button" type="button" aria-label="Log in">
                    <span class="text-wrapper-2">Log in</span>
                </button>
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../../User/Tournament List Page 1/userlogin_1.html" aria-label="Tournament">
                    <img src="../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../../User/Team(noHave) Page 3/Teamnohave_3.html" aria-label="Teams">
                    <img src="../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="section" aria-label="Upcoming Matches">
            <div class="heading">
                <div class="icon-wrapper">
                    <img class="icon-4" src="img/icon-4.svg" alt="Upcoming matches icon" />
                </div>
                <h1 class="text-wrapper-3">Upcoming Matches</h1>
            </div>
            <div class="container-6">
                <!-- Match 1 -->
                <article class="background-border" aria-label="Match: Team Omega vs KMITL Knights">
                    <div class="container-7">
                        <div class="container-8">
                            <div class="div-2"><span class="text-8">START IN</span></div>
                            <div class="div-2"><time class="text-9">15:30</time></div>
                        </div>
                        <div class="container-9">
                            <div class="div">
                                <div class="div-2"><span class="text-10">Team Omega</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-4">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-wrapper-5">KMITL Knights</span></div>
                            </div>
                        </div>
                    </div>
                </article>
                <!-- Match 2 -->
                <article class="container-wrapper" aria-label="Match: Steel Rebels vs Shadow Step">
                    <div class="container-10">
                        <div class="container-11">
                            <div class="div-2"><span class="text-11">DEC 12</span></div>
                            <div class="div-2"><time class="text-12">20:00</time></div>
                        </div>
                        <div class="container-12">
                            <div class="div">
                                <div class="div-2"><span class="text-13">Steel Rebels</span></div>
                                <div class="div-3"></div>
                            </div>
                            <div class="div-2"><span class="text-wrapper-4">VS</span></div>
                            <div class="div">
                                <div class="div-3"></div>
                                <div class="div-2"><span class="text-14">Shadow Step</span></div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-13">
                <span class="text-wrapper-6">© 2026 KMITL ESPORT</span>
            </div>
            <span class="text-wrapper-7">Documentation</span>
            <span class="text-wrapper-8">API Reference</span>
            <span class="text-wrapper-9">Support</span>
        </footer>
    </div>
</body>

</html>
