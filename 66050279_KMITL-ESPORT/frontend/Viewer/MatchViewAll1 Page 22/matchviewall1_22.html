<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT</title>
    <link rel="stylesheet" href="globals22.css" />
    <link rel="stylesheet" href="styleguide22.css" />
    <link rel="stylesheet" href="style22.css?v=3" />
    <link rel="stylesheet" href="../../Admin/TournamentList Page 9/style9.css?v=3" />
    <link rel="stylesheet" href="../../User/Tournament List Page 1/style1.css?v=3" />
    <link rel="stylesheet" href="../../shared-admin.css?v=4" />
</head>

<body>
    <div class="viewer-match-view">
        <!-- Header -->
        <header class="header-top namespaced-header" role="banner">
            <div class="ns-header-left">
                <img class="ns-logo-img" src="../../../icons/Logo.png" alt="KMITL ESPORT Logo" />
                <div class="ns-title-wrap">
                    <span class="ns-title-text">KMITL ESPORT</span>
                </div>
                <nav class="ns-main-nav" aria-label="Main navigation">
                    <a href="../Tournament Page 17/tournament_17.html" class="ns-nav-link active">Home</a>
                    <a href="#" class="ns-nav-link">Explore</a>
                    <a href="#" class="ns-nav-link">News</a>
                </nav>
            </div>
            <div class="ns-header-right">
                <label class="ns-search-box" aria-label="Search tournaments">
                    <div class="ns-search-bg">
                        <img class="ns-search-icon" src="../../../icons/search.svg" alt="Search icon" />
                    </div>
                    <input class="ns-search-input" placeholder="Search tournaments..." type="search" aria-label="Search tournaments" />
                </label>
                <a href="../../Login Page/login.html" style="background:#ff8c00;color:white;padding:10px 20px;border-radius:48px;font-weight:700;font-size:14px;text-decoration:none;white-space:nowrap;">Login</a>
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="sidebar-nav-container">
                <a class="link" href="../Tournament Page 17/tournament_17.html" aria-label="Tournament">
                    <img src="../../../icons/trophy-star.svg" alt="Tournament icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Tournament</span>
                </a>
                <a class="link-2" href="../../Login Page/login.html" aria-label="Teams">
                    <img src="../../../icons/users.svg" alt="Teams icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Teams</span>
                </a>
                <a class="link-2" href="#" aria-label="About">
                    <img src="../../../icons/info.svg" alt="About icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">About</span>
                </a>
                <a class="link-2" href="#" aria-label="Settings">
                    <img src="../../../icons/settings.svg" alt="Settings icon" style="width:20px; height:20px;" />
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="frame" role="main" aria-label="Tournaments">
            <section class="section-margin" aria-labelledby="tournaments-heading">
                <div class="section-header">
                    <div class="header-left">
                        <h1 class="text-wrapper-3" id="tournaments-heading">Tournaments List</h1>
                        <p class="p">All tournaments hosted by KMITL ESPORT.</p>
                    </div>
                </div>
                <div class="container-8" id="tournament-list-container">
                    <p style="padding: 40px; text-align: center; color: #64748b; font-size: 18px;">Loading tournaments...</p>
                </div>
            </section>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../api-config.js"></script>
    <script>
        (function () {
            const listContainer = document.getElementById('tournament-list-container');

            async function loadTournaments() {
                try {
                    const res = await fetch(`${API_BASE_URL}/tournaments`);
                    if (!res.ok) throw new Error('Server responded with ' + res.status);
                    const tournaments = await res.json();

                    listContainer.innerHTML = '';
                    if (!tournaments || tournaments.length === 0) {
                        listContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: #64748b;">No tournaments available.</p>';
                        return;
                    }

                    tournaments.forEach(t => {
                        const article = document.createElement('article');
                        article.className = 'background-shadow';
                        const bannerSrc = t.tournament_banner || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800';
                        article.innerHTML = `
                            <div class="container-9">
                                <img src="${bannerSrc}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800'" style="width:100%;height:100%;object-fit:cover;">
                            </div>
                            <div class="container-10">
                                <h2 class="text-wrapper-5">${t.tournament_name}</h2>
                                <p class="major-tournament">${(t.tournament_type || '').split(' • ')[0]}</p>
                                <div class="container-11">
                                    <div class="container-12">
                                        <img src="../../../icons/calendar-clock.svg" style="width:16px;height:16px;" />
                                        <span>${t.start_date ? new Date(t.start_date).toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) : 'TBD'}</span>
                                    </div>
                                    <div class="container-12">
                                        <img src="../../../icons/users.svg" style="width:16px;height:16px;" />
                                        <span>${t._count?.applications || 0} Teams</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        listContainer.appendChild(article);
                    });
                } catch (error) {
                    console.error('Load Failed:', error);
                    listContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: #ef4444;">Failed to connect to data source.</p>';
                }
            }

            loadTournaments();
        })();
    </script>
</body>

</html>
