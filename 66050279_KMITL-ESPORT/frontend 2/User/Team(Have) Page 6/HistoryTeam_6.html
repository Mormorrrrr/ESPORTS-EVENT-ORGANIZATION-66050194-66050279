<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - My History Team</title>
    <link rel="stylesheet" href="globals6.css" />
    <link rel="stylesheet" href="styleguide6.css" />
    <link rel="stylesheet" href="style6.css" />
</head>

<body>
    <div class="user-team">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container-9">
                <img class="chatgpt-image" src="img/chatgpt-image-4-2569-15-54-45-removebg-preview-1.png"
                    alt="KMITL ESPORT Logo" />
                <div class="heading-wrapper">
                    <div class="div-2">
                        <h1 class="text-wrapper-10">KMITL ESPORT</h1>
                    </div>
                </div>
                <nav class="container-10" aria-label="Main navigation">
                    <div class="div-2"><span class="text-2">Home</span></div>
                    <div class="div-2"><span class="text-3">Explore</span></div>
                    <div class="div-2"><span class="text-4">News</span></div>
                </nav>
            </div>
            <div class="container-11">
                <label class="label" aria-label="Search tournaments">
                    <div class="container-12">
                        <div class="background">
                            <div class="div-2">
                                <img class="icon-5" src="img/image.svg" alt="Search icon" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="container-13">
                                <input class="text-5" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </label>
                <div class="container-14">
                    <button class="iconstack-io-plus-wrapper" aria-label="Add new item" type="button">
                        <div class="iconstack-io-plus" aria-hidden="true">
                            <img class="vector" src="img/vector.svg" alt="" />
                            <img class="vector-2" src="img/vector-2.svg" alt="" />
                        </div>
                    </button>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User profile" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5" aria-label="Section navigation">
                <a class="link" href="#tournaments" aria-label="Tournaments">
                    <img class="icon" src="img/icon-3.svg" alt="" aria-hidden="true" />
                    <div class="container-6">
                        <span class="text-wrapper-6">Tournaments</span>
                    </div>
                </a>
                <a class="link-2" href="#teams" aria-label="Teams" aria-current="page">
                    <div class="div-2">
                        <div class="div-2">
                            <img class="icon-2" src="img/icon-6.svg" alt="" aria-hidden="true" />
                        </div>
                    </div>
                    <div class="container-7">
                        <span class="text-wrapper-7">Teams</span>
                    </div>
                </a>
                <a class="link" href="#about" aria-label="About">
                    <div class="div-2">
                        <img class="icon-3" src="img/icon-2.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="container-8">
                        <span class="text-wrapper-8">About</span>
                    </div>
                </a>
                <a class="link" href="#settings" aria-label="Settings">
                    <div class="div-2">
                        <img class="icon-4" src="img/icon.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div-2">
                        <span class="text-wrapper-9">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="tournaments-list-wrapper" role="main">
            <section class="tournaments-list" aria-labelledby="history-team-heading">
                <div class="container-2">
                    <div class="div-2">
                        <h2 id="history-team-heading" class="my-history-team">My&nbsp;&nbsp;History Team</h2>
                    </div>
                    <button class="button" type="button" aria-label="View all history teams">
                        <span class="text">View All</span>
                    </button>
                </div>
                <ul class="tournament-card-wrapper" aria-label="Team history list">
                    <li class="tournament-card">
                        <div class="valorant-tournament-wrapper" aria-hidden="true">
                            <div class="valorant-tournament">
                                <img class="image" src="img/image-5.png" alt="" />
                                <img class="img" src="img/image-6.png" alt="Team A logo" />
                            </div>
                        </div>
                        <div class="container-3">
                            <div class="heading">
                                <span class="text-wrapper-4">Team A</span>
                            </div>
                            <div class="container-wrapper">
                                <div class="container-4">
                                    <div class="div-2">
                                        <img class="icon" src="img/icon-5.svg" alt="" aria-hidden="true" />
                                    </div>
                                    <div class="div-2">
                                        <span class="text-wrapper-5">Rov KMITL Cup 2026</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="button-wrapper">
                            <button class="div-wrapper" type="button" aria-label="Edit Team A">
                                <div class="icon-wrapper">
                                    <img class="icon" src="img/icon-4.svg" alt="" aria-hidden="true" />
                                </div>
                            </button>
                        </div>
                    </li>
                </ul>
            </section>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container">
                <span class="text-wrapper">© 2026 KMITL ESPORT</span>
            </div>
            <span class="div">Documentation</span>
            <span class="text-wrapper-2">API Reference</span>
            <span class="text-wrapper-3">Support</span>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.querySelector('.tournament-card-wrapper');
            const userStr = localStorage.getItem('user');
            
            if (!userStr) {
                listContainer.innerHTML = '<p style="color:white; padding: 20px;">Please login to view your teams.</p>';
                return;
            }
            
            const user = JSON.parse(userStr);

            try {
                const res = await fetch('http://localhost:3000/teams');
                const allTeams = await res.json();
                
                // Filter teams where user is creator or leader (basic check)
                const myTeams = allTeams.filter(t => t.created_by === user.user_id);
                
                listContainer.innerHTML = ''; // Clear hardcoded examples
                
                if (myTeams.length === 0) {
                    listContainer.innerHTML = '<p style="color:white; padding: 20px;">You have no teams yet.</p>';
                    return;
                }

                myTeams.forEach(team => {
                    const li = document.createElement('li');
                    li.className = 'tournament-card';
                    li.innerHTML = `
                        <div class="valorant-tournament-wrapper" aria-hidden="true">
                            <div class="valorant-tournament" style="display:flex; align-items:center; justify-content:center; background:#333;">
                                <!-- placeholder for team logo -->
                                <span style="font-size: 24px; color: white;">${team.team_name.substring(0,2).toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="container-3">
                            <div class="heading">
                                <span class="text-wrapper-4">${team.team_name}</span>
                            </div>
                            <div class="container-wrapper">
                                <div class="container-4">
                                    <div class="div-2">
                                        <span class="text-wrapper-5">Leader: ${team.leader_name}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="button-wrapper">
                            <button class="div-wrapper" type="button" aria-label="Edit ${team.team_name}">
                                <div class="icon-wrapper">
                                    <span style="color:white; font-size:12px;">Edit</span>
                                </div>
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(li);
                });
            } catch (error) {
                console.error('Error fetching teams:', error);
                listContainer.innerHTML = '<p style="color:white; padding: 20px;">Error loading teams.</p>';
            }
        });
    </script>
</body>

</html>
