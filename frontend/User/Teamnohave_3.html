<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Teams</title>
    <link rel="stylesheet" href="globals3.css" />
    <link rel="stylesheet" href="styleguide3.css" />
    <link rel="stylesheet" href="style3.css" />
</head>

<body>
    <div class="user-team-nohave">
        <!-- Header / Top Navigation -->
        <header class="header-top" role="banner">
            <div class="container-5">
                <a href="/" aria-label="KMITL ESPORT Home">
                    <img class="chatgpt-image" src="img/chatgpt-image-4-2569-15-54-45-removebg-preview-1.png"
                        alt="KMITL ESPORT Logo" />
                </a>
                <div class="heading-wrapper">
                    <div class="div-2">
                        <h1 class="text-wrapper-10">KMITL ESPORT</h1>
                    </div>
                </div>
                <nav class="container-6" aria-label="Main navigation">
                    <div class="div-2"><a class="text" href="/">Home</a></div>
                    <div class="div-2"><a class="text-2" href="/explore">Explore</a></div>
                    <div class="div-2"><a class="text-3" href="/news">News</a></div>
                </nav>
            </div>
            <div class="container-7">
                <label class="label" for="search-tournaments" aria-label="Search tournaments">
                    <div class="container-8">
                        <div class="background">
                            <div class="div-2">
                                <img class="icon-4" src="img/icon.svg" alt="Search icon" aria-hidden="true" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="container-9">
                                <input id="search-tournaments" class="text-4" placeholder="Search tournaments..."
                                    type="search" aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </label>
                <div class="button-wrapper">
                    <button class="iconstack-io-plus-wrapper" aria-label="Add new item" type="button">
                        <span class="iconstack-io-plus" aria-hidden="true">
                            <img class="vector" src="img/vector.svg" alt="" />
                            <img class="vector-2" src="img/vector-2.svg" alt="" />
                        </span>
                    </button>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User avatar" />
            </div>
        </header>
        <!-- Sidebar Navigation -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-2">
                <a class="link" href="/tournaments" aria-label="Tournaments">
                    <img class="icon" src="img/icon-3.svg" alt="" aria-hidden="true" />
                    <div class="div-wrapper">
                        <span class="text-wrapper-4">Tournaments</span>
                    </div>
                </a>
                <a class="link-2" href="/teams" aria-label="Teams" aria-current="page">
                    <div class="div-2">
                        <div class="div-2">
                            <img class="img" src="img/image.svg" alt="" aria-hidden="true" />
                        </div>
                    </div>
                    <div class="container-3">
                        <span class="text-wrapper-5">Teams</span>
                    </div>
                </a>
                <a class="link" href="/about" aria-label="About">
                    <div class="div-2">
                        <img class="icon-2" src="img/icon-2.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="container-4">
                        <span class="text-wrapper-6">About</span>
                    </div>
                </a>
                <a class="link" href="/settings" aria-label="Settings">
                    <div class="div-2">
                        <img class="icon-3" src="img/icon-4.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div-2">
                        <span class="text-wrapper-7">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content Area -->
        <main class="main-content" aria-label="Teams content">
            <p class="text-wrapper-9">ยังไม่มีอะไรที่นี่</p>
            <button class="button" type="button" aria-label="Create a new team">
                <span class="button-shadow" aria-hidden="true"></span>
                <span class="text-wrapper-8">Create Team</span>
            </button>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container">
                <span class="text-wrapper">© 2026 KMITL ESPORT</span>
            </div>
            <a class="div" href="/documentation">Documentation</a>
            <a class="text-wrapper-2" href="/api-reference">API Reference</a>
            <a class="text-wrapper-3" href="/support">Support</a>
        </footer>
    </div>
</body>

</html>
