<!DOCTYPE html>
<html lang="en">

<head>

    <title>KMITL ESPORT Admin Dashboard</title>
    <link rel="stylesheet" href="globals8.css" />
    <link rel="stylesheet" href="styleguide8.css" />
    <link rel="stylesheet" href="style8.css" />
</head>

<body>
    <div class="admin-dashboard">
        <!-- Header -->

                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div-2"><span class="text">Home</span></div>
                    <div class="div-2"><span class="text-2">Explore</span></div>
                    <div class="div-2"><span class="text-3">News</span></div>
                </nav>
            </div>
            <div class="container-3">

                        </div>
                        <div class="input">
                            <div class="div-wrapper">

                            </div>
                        </div>

                </label>
                <img class="image-background" src="img/image-background-border.svg" alt="User avatar" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">

                <a class="link-2" href="../TournamentList Page 9/TournamentList_9.html">
                    <div class="div-2">

                    </div>
                    <div class="container-6">
                        <a class="text-wrapper-3" href="../TournamentList Page 9/TournamentList_9.html" style="text-decoration: none; color: inherit;">Tournament</a>
                    </div>
                </a>
                <a class="link-2" href="../TeamList Page 12/TeamList_12.html">

                <a class="link-2" href="#">
                    <div class="div-2">
                        <img class="icon-3" src="img/icon-8.svg" alt="About icon" />

                        <span class="text-6">About</span>
                    </div>
                </a>
                <a class="link-2" href="#">
                    <div class="div-2">

                    </div>
                    <div class="div-2">

            </nav>
        </aside>
        <!-- Main Content -->
        <main class="frame">
            <div class="container-7">
                <!-- Stats Grid -->
                <section class="stats-grid" aria-label="Statistics overview">
                    <article class="background-border">
                        <div class="overlay-wrapper">
                            <div class="overlay">

                                    <img class="icon-5" src="img/icon-5.svg" alt="Tournaments icon" />
                                </div>
                            </div>
                        </div>
                        <div class="container-8">
                            <span class="text-wrapper-4">Total Tournaments</span>
                        </div>
                        <div class="heading">
                            <span class="text-8">12</span>
                        </div>
                    </article>
                    <article class="background-border">
                        <div class="container-9">
                            <div class="overlay">
                                <div class="div-2">
                                    <img class="icon-6" src="img/icon-9.svg" alt="Teams icon" />
                                </div>
                            </div>
                        </div>
                        <div class="container-8">
                            <span class="text-9">Total Teams</span>
                        </div>
                        <div class="heading">
                            <span class="text-10">48</span>
                        </div>
                    </article>
                    <article class="background-border-2">
                        <div class="container-10">
                            <div class="overlay">
                                <div class="div-2">
                                    <img class="icon-3" src="img/icon-7.svg" alt="Players icon" />
                                </div>
                            </div>
                        </div>
                        <div class="container-8">
                            <span class="text-11">Total Players</span>
                        </div>
                        <div class="heading">
                            <span class="text-12">240</span>
                        </div>
                    </article>
                </section>
                <!-- Upcoming Matches -->
                <section class="section" aria-label="Upcoming Matches">
                    <div class="heading-2">
                        <div class="icon-wrapper">
                            <img class="icon-7" src="img/icon-2.svg" alt="Upcoming matches icon" />
                        </div>
                        <h2 class="text-wrapper-5">Upcoming Matches</h2>
                    </div>
                    <div class="container-11">
                        <!-- Match 1 -->
                        <div class="container-wrapper">
                            <div class="container-12">
                                <div class="container-13">
                                    <div class="div-2"><span class="text-13">START IN</span></div>
                                    <div class="div-2"><span class="text-14">15:30</span></div>
                                </div>
                                <div class="container-14">
                                    <div class="div">
                                        <div class="div-2"><span class="text-15">Team Omega</span></div>
                                        <div class="div-3"></div>
                                    </div>
                                    <div class="div-2"><span class="text-16">VS</span></div>
                                    <div class="div">
                                        <div class="div-3"></div>
                                        <div class="div-2"><span class="text-wrapper-6">KMITL Knights</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Match 2 -->
                        <div class="background-border-3">
                            <div class="container-12">
                                <div class="container-15">
                                    <div class="div-2"><span class="text-17">DEC 12</span></div>
                                    <div class="div-2"><span class="text-18">20:00</span></div>
                                </div>
                                <div class="container-16">
                                    <div class="div">
                                        <div class="div-2"><span class="text-19">Steel Rebels</span></div>
                                        <div class="div-3"></div>
                                    </div>
                                    <div class="div-2"><span class="text-16">VS</span></div>
                                    <div class="div">
                                        <div class="div-3"></div>
                                        <div class="div-2"><span class="text-20">Shadow Step</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="button" type="button" aria-label="View all upcoming matches">
                        <span class="text-wrapper-7">View All</span>
                        <div class="img-wrapper">
                            <img class="icon-8" src="img/image.svg" alt="Arrow icon" />
                        </div>
                    </button>
                </section>
            </div>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-17">
                <span class="text-wrapper-8">© 2026 KMITL ESPORT</span>
            </div>
            <span class="text-wrapper-9">Documentation</span>
            <span class="text-wrapper-10">API Reference</span>
            <span class="text-wrapper-11">Support</span>
        </footer>
    </div>
    <script>
        async function fetchDashboardStats() {
            try {
                const [tournamentsRes, teamsRes, usersRes] = await Promise.all([
                    fetch('http://localhost:3000/tournaments'),
                    fetch('http://localhost:3000/teams'),
                    fetch('http://localhost:3000/users')
                ]);

                if (tournamentsRes.ok && teamsRes.ok && usersRes.ok) {
                    const tournaments = await tournamentsRes.json();
                    const teams = await teamsRes.json();
                    const users = await usersRes.json();

                    document.querySelector('.text-8').textContent = tournaments.length;
                    document.querySelector('.text-10').textContent = teams.length;
                    document.querySelector('.text-12').textContent = users.length;
                } else {
                    console.error('Failed to fetch dashboard stats');
                }
            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardStats);
    </script>
</body>

</html>
