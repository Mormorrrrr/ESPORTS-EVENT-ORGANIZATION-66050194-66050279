<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>KMITL ESPORT - Admin Team List</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="admin-team-list">
        <!-- Header -->
        <header class="header-top" role="banner">
            <div class="container">
                <img class="chatgpt-image" src="img/chatgpt-image-4-2569-15-54-45-removebg-preview-1.png"
                    alt="KMITL ESPORT Logo" />
                <div class="heading-wrapper">
                    <div class="div">
                        <span class="text-wrapper">KMITL ESPORT</span>
                    </div>
                </div>
                <nav class="container-2" aria-label="Main navigation">
                    <div class="div"><a class="text" href="#">Home</a></div>
                    <div class="div"><a class="text-2" href="#">Explore</a></div>
                    <div class="div"><a class="text-3" href="#">News</a></div>
                </nav>
            </div>
            <div class="container-3">
                <div class="label">
                    <div class="container-4">
                        <div class="background">
                            <div class="div">
                                <img class="icon" src="img/icon-4.svg" alt="Search icon" aria-hidden="true" />
                            </div>
                        </div>
                        <div class="input">
                            <div class="div-wrapper">
                                <input class="text-4" placeholder="Search tournaments..." type="search"
                                    aria-label="Search tournaments" />
                            </div>
                        </div>
                    </div>
                </div>
                <img class="image-background" src="img/image-background-border.svg" alt="User avatar" />
            </div>
        </header>
        <!-- Sidebar -->
        <aside class="aside-sidebar" aria-label="Sidebar navigation">
            <nav class="container-5">
                <a class="link" href="#" aria-label="Dashboard">
                    <div class="uis-graph-bar-wrapper">
                        <img class="uis-graph-bar" src="img/uis-graph-bar.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-wrapper-2">Dashboard</span>
                    </div>
                </a>
                <a class="link" href="#" aria-label="Tournament">
                    <div class="div">
                        <img class="img" src="img/icon-15.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="container-6">
                        <span class="text-wrapper-3">Tournament</span>
                    </div>
                </a>
                <a class="link-2" href="#" aria-current="page" aria-label="Teams">
                    <div class="div">
                        <img class="icon-2" src="img/icon-16.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-wrapper-4">Teams</span>
                    </div>
                </a>
                <a class="link-3" href="#" aria-label="About">
                    <div class="div">
                        <img class="icon-3" src="img/icon-8.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-5">About</span>
                    </div>
                </a>
                <a class="link-3" href="#" aria-label="Settings">
                    <div class="div">
                        <img class="icon-4" src="img/icon-11.svg" alt="" aria-hidden="true" />
                    </div>
                    <div class="div">
                        <span class="text-6">Settings</span>
                    </div>
                </a>
            </nav>
        </aside>
        <!-- Main Content -->
        <main class="tournaments-list" aria-label="Team List">
            <div class="container-7">
                <div class="div">
                    <h1 class="text-wrapper-5">Team List</h1>
                </div>
            </div>
            <!-- First card row (single card) -->
            <div class="container-8">
                <article class="tournament-card" aria-label="Team A - Approved">
                    <div class="valorant-tournament-wrapper">
                        <div class="valorant-tournament" role="img" aria-label="Team A logo"></div>
                    </div>
                    <div class="container-9">
                        <div class="heading">
                            <span class="text-wrapper-6">Team A</span>
                        </div>
                        <div class="container-wrapper">
                            <div class="container-10">
                                <div class="div">
                                    <img class="icon-5" src="img/icon-7.svg" alt="" aria-hidden="true" />
                                </div>
                                <div class="div">
                                    <span class="text-wrapper-7">Rov KMITL Cup 2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="container-11">
                        <div class="approve-wrapper">
                            <span class="approve">APPROVE</span>
                        </div>
                        <button class="button" type="button" aria-label="Edit Team A">
                            <div class="icon-wrapper">
                                <img class="img" src="img/icon-2.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                        <button class="button" type="button" aria-label="Delete Team A">
                            <div class="icon-wrapper">
                                <img class="icon-6" src="img/icon.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                    </div>
                </article>
            </div>
            <!-- Second card row (multiple cards) -->
            <div class="container-8 container-8--offset">
                <article class="tournament-card" aria-label="Team A - Approved">
                    <div class="valorant-tournament-wrapper">
                        <div class="image-wrapper">
                            <img class="image" src="img/image-7.png" alt="Team A logo" />
                        </div>
                    </div>
                    <div class="container-9">
                        <div class="heading">
                            <span class="text-wrapper-6">Team A</span>
                        </div>
                        <div class="container-wrapper">
                            <div class="container-10">
                                <div class="div">
                                    <img class="icon-5" src="img/icon-13.svg" alt="" aria-hidden="true" />
                                </div>
                                <div class="div">
                                    <span class="text-wrapper-7">Rov KMITL Cup 2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="container-11">
                        <div class="approve-wrapper">
                            <span class="approve">APPROVE</span>
                        </div>
                        <button class="button" type="button" aria-label="Edit Team A">
                            <div class="icon-wrapper">
                                <img class="img" src="img/icon-3.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                        <button class="button" type="button" aria-label="Delete Team A">
                            <div class="icon-wrapper">
                                <img class="icon-6" src="img/icon-12.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                    </div>
                </article>
                <article class="tournament-card" aria-label="Team B - Pending">
                    <div class="valorant-tournament-wrapper">
                        <div class="valorant-tournament-2" role="img" aria-label="Team B logo"></div>
                    </div>
                    <div class="container-9">
                        <div class="heading">
                            <span class="text-wrapper-6">Team B</span>
                        </div>
                        <div class="container-wrapper">
                            <div class="container-10">
                                <div class="div">
                                    <img class="icon-5" src="img/image.svg" alt="" aria-hidden="true" />
                                </div>
                                <div class="div">
                                    <span class="text-wrapper-7">Rov KMITL Cup 2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="container-11">
                        <div class="pending-wrapper">
                            <span class="pending">PENDING</span>
                        </div>
                        <button class="button" type="button" aria-label="Edit Team B">
                            <div class="icon-wrapper">
                                <img class="img" src="img/icon-14.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                        <button class="button" type="button" aria-label="Delete Team B">
                            <div class="icon-wrapper">
                                <img class="icon-6" src="img/icon-9.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                    </div>
                </article>
                <article class="tournament-card" aria-label="Team C - Rejected">
                    <div class="valorant-tournament-wrapper">
                        <div class="valorant-tournament-3" role="img" aria-label="Team C logo"></div>
                    </div>
                    <div class="container-9">
                        <div class="heading">
                            <span class="text-wrapper-6">Team C</span>
                        </div>
                        <div class="container-wrapper">
                            <div class="container-10">
                                <div class="div">
                                    <img class="icon-5" src="img/icon-10.svg" alt="" aria-hidden="true" />
                                </div>
                                <div class="div">
                                    <span class="text-wrapper-7">Rov KMITL Cup 2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="container-11">
                        <div class="reject-wrapper">
                            <span class="reject">REJECT</span>
                        </div>
                        <button class="button" type="button" aria-label="Edit Team C">
                            <div class="icon-wrapper">
                                <img class="img" src="img/icon-5.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                        <button class="button" type="button" aria-label="Delete Team C">
                            <div class="icon-wrapper">
                                <img class="icon-6" src="img/icon-6.svg" alt="" aria-hidden="true" />
                            </div>
                        </button>
                    </div>
                </article>
            </div>
            <div class="container-12"></div>
            <!-- Add Team Button -->
            <button class="iconstack-io-plus-wrapper" type="button" aria-label="Add new team">
                <div class="iconstack-io-plus" aria-hidden="true">
                    <img class="vector" src="img/vector.svg" alt="" />
                    <img class="vector-2" src="img/vector-2.svg" alt="" />
                </div>
            </button>
        </main>
        <!-- Footer -->
        <footer class="footer-footer" role="contentinfo">
            <div class="container-13">
                <span class="text-wrapper-8">© 2026 KMITL ESPORT</span>
            </div>
            <a class="text-wrapper-9" href="#">Documentation</a>
            <a class="text-wrapper-10" href="#">API Reference</a>
            <a class="text-wrapper-11" href="#">Support</a>
        </footer>
    </div>
</body>

</html>
